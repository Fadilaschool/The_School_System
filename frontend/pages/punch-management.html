<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="attendance.punch_management">Punch File Management - HR Operations Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
    <script src="../assets/js/translations.js"></script>
    
    <style>
        /* Director-themed base styles */
        :root {
            --director-indigo: #4338ca;
            --director-blue: #2563eb;
            --director-purple: #7c3aed;
            --director-slate: #0f172a;
            --director-card-bg: #ffffff;
            --director-surface: #f8fafc;
        }

        body {
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--director-slate);
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.06), transparent 45%), #f5f7fb;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        /* Page Header Styles */
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 0.75rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .page-title i {
            color: #3b82f6;
            font-size: 1.75rem;
        }

        .page-subtitle {
            font-size: 1rem;
            color: #64748b;
            margin: 0;
            font-weight: 500;
        }

        /* Director Panel */
        .director-panel {
            margin-top: 16px;
            background: var(--director-card-bg);
            border-radius: 22px;
            padding: 24px 24px 20px;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(15, 23, 42, 0.06);
            position: relative;
            overflow: hidden;
        }

        .director-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg,
                    rgba(37, 99, 235, 0.12),
                    rgba(124, 58, 237, 0.08),
                    rgba(56, 189, 248, 0.08));
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .director-panel>* {
            position: relative;
            z-index: 1;
        }

        .director-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .director-panel-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .director-panel-title-icon {
            width: 32px;
            height: 32px;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left,
                    rgba(37, 99, 235, 0.22),
                    rgba(37, 99, 235, 0.05));
            color: #1d4ed8;
        }

        .director-section-pill {
            padding: 0.15rem 0.7rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(15, 23, 42, 0.04);
            color: #64748b;
        }

        /* Enhanced Buttons */
        .filter-button {
            padding: 0.6rem 1.2rem;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.95));
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-button:hover {
            background: linear-gradient(135deg, #e5edff, #dbeafe);
            border-color: #93c5fd;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
            transform: translateY(-2px);
        }

        .filter-button.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-color: #2563eb;
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.35);
            transform: translateY(-2px);
        }

        /* Enhanced Table Styles */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
        }

        .complaints-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1000px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }

        .complaints-table thead {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-bottom: 2px solid #e2e8f0;
        }

        .complaints-table th {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #475569;
            padding: 1.25rem 1rem;
            border-bottom: 2px solid #e2e8f0;
            vertical-align: middle;
            position: relative;
            white-space: nowrap;
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        }

        .complaints-table tbody tr {
            background: white;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f1f5f9;
        }

        .complaints-table tbody tr:hover {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
        }

        .complaints-table td {
            padding: 1rem;
            vertical-align: middle;
            font-size: 0.875rem;
            color: #1e293b;
            font-weight: 500;
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Dropzone Enhancement */
        .dropzone {
            border: 2px dashed #cbd5e0;
            transition: all 0.3s ease;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.95));
            position: relative;
            overflow: hidden;
        }

        .dropzone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.05), transparent 70%);
            pointer-events: none;
        }

        .dropzone.dragover {
            border-color: #3b82f6;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
        }

        .file-item:hover .file-actions {
            opacity: 1;
        }

        .file-actions {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        /* Enhanced Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .status-uploaded {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-parsed {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .status-saved {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #166534;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* Enhanced Action Buttons */
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            pointer-events: none;
        }

        .action-btn span {
            position: relative;
            z-index: 1;
        }

        .action-btn-view {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .action-btn-view:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .action-btn-delete {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .action-btn-delete:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* Enhanced Form Elements */
        .filter-field-group {
            padding: 1rem;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.95));
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
            transition: all 0.3s ease;
        }

        .filter-field-group:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
        }

        .filter-field-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-field-group label i {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .filter-select {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            background: #ffffff;
            color: #0f172a;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background-color: #f9fafb;
        }

        .filter-select:hover {
            border-color: #94a3b8;
            background-color: #f8fafc;
        }

        /* RTL Support */
        [dir="rtl"] .director-panel {
            direction: rtl;
        }

        [dir="rtl"] .filter-field-group {
            text-align: right !important;
            direction: rtl !important;
        }

        [dir="rtl"] .filter-field-group label {
            text-align: right !important;
        }

        [dir="rtl"] .filter-select {
            direction: rtl !important;
            text-align: right !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.5rem;
                flex-direction: column;
                gap: 0.5rem;
            }

            .page-title i {
                font-size: 1.5rem;
            }

            .page-subtitle {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <main>
        <div class="w-full" style="padding: 1.5rem;">
            <!-- Page Title & Description -->
            <div class="page-header">
                <h1 class="page-title" data-translate="attendance.punch_management">
                    <i class="fas fa-file-upload"></i>
                    إدارة ملفات البصمة
                </h1>
                <p class="page-subtitle" data-translate="attendance.punch_management_subtitle">رفع وإدارة ملفات البصمة مع المعالجة المتقدمة</p>
            </div>

            <!-- Two Column Layout -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column - Upload and Files List -->
            <div class="lg:col-span-1 space-y-6">
                <!-- File Upload Section -->
                <div class="director-panel">
                    <div class="director-panel-header">
                        <div class="director-panel-title">
                            <div class="director-panel-title-icon">
                                <i class="fas fa-cloud-upload-alt"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-900" data-translate="attendance.upload_punch_file">رفع ملف البصمة</h3>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="director-section-pill" data-translate="attendance.upload_section">رفع الملفات</span>
                        </div>
                    </div>
                    
                    <!-- Dropzone -->
                    <div id="dropzone" class="dropzone rounded-lg p-8 text-center cursor-pointer">
                        <div class="space-y-2">
                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400"></i>
                            <p class="text-gray-600" data-translate="common.drag_drop_file">اسحب وأفلت ملف .xls/.xlsx هنا</p>
                            <p class="text-sm text-gray-500" data-translate="common.or_click_to_select">أو انقر للاختيار</p>
                        </div>
                    </div>
                    
                    <input type="file" id="fileInput" class="hidden" accept=".xls,.xlsx">
                    
                    <!-- Upload Button -->
                    <button id="uploadBtn" class="w-full filter-button active disabled:opacity-50 disabled:cursor-not-allowed" disabled data-translate="btn.upload_file">
                        <i class="fas fa-upload"></i>
                        <span data-translate="btn.upload_file">رفع الملف</span>
                    </button>
                    
                    <!-- Progress Bar -->
                    <div id="progressContainer" class="mt-4 hidden">
                        <div class="flex justify-between text-sm text-gray-600 mb-1">
                            <span data-translate="common.uploading">Uploading...</span>
                            <span id="progressText">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div id="progressBar" class="progress-bar bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Uploaded Files List -->
                <div class="director-panel">
                    <div class="director-panel-header">
                        <div class="director-panel-title">
                            <div class="director-panel-title-icon">
                                <i class="fas fa-folder-open"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-900" data-translate="common.uploaded_files">الملفات المرفوعة</h3>
                            </div>
                        </div>
                        <span class="director-section-pill" data-translate="attendance.files_section">قائمة الملفات</span>
                    </div>
                    <div id="filesList" class="divide-y divide-gray-200 max-h-96 overflow-y-auto">
                        <!-- Files will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Right Column - Raw Punches Table -->
            <div class="lg:col-span-2">
                <div class="director-panel">
                    <div class="director-panel-header">
                        <div class="director-panel-title">
                            <div class="director-panel-title-icon">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-900" data-translate="attendance.raw_punches">سجلات البصمة الخام</h3>
                            </div>
                        </div>
                        <span class="director-section-pill" data-translate="attendance.punches_section">السجلات</span>
                    </div>
                    
                    <div class="mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="filter-field-group">
                            <label for="punchFilterEmployee" data-translate="employee.employee">
                                <i class="fas fa-user"></i>
                                الموظف
                            </label>
                            <input type="text" id="punchFilterEmployee" data-translate-placeholder="common.search_name" placeholder="ابحث بالاسم" class="filter-select">
                        </div>
                        <div class="filter-field-group">
                            <label for="punchFilterYear" data-translate="time.year">
                                <i class="fas fa-calendar"></i>
                                السنة
                            </label>
                            <select id="punchFilterYear" class="filter-select"></select>
                        </div>
                        <div class="filter-field-group">
                            <label for="punchFilterMonth" data-translate="time.month">
                                <i class="fas fa-calendar-alt"></i>
                                الشهر
                            </label>
                            <select id="punchFilterMonth" class="filter-select">
                                <option value="">الكل</option>
                                <option value="1">يناير</option>
                                <option value="2">فبراير</option>
                                <option value="3">مارس</option>
                                <option value="4">أبريل</option>
                                <option value="5">مايو</option>
                                <option value="6">يونيو</option>
                                <option value="7">يوليو</option>
                                <option value="8">أغسطس</option>
                                <option value="9">سبتمبر</option>
                                <option value="10">أكتوبر</option>
                                <option value="11">نوفمبر</option>
                                <option value="12">ديسمبر</option>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button id="punchFilterSearch" class="filter-button active w-full" data-translate="btn.apply">
                                <i class="fas fa-search"></i>
                                <span data-translate="btn.apply">تطبيق</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="table-wrapper">
                        <table class="complaints-table" id="rawPunchesTable">
                            <thead>
                                <tr>
                                    <th data-translate="employee.employee">الموظف</th>
                                    <th data-translate="attendance.punch_time">وقت البصمة</th>
                                    <th data-translate="attendance.source">المصدر</th>
                                    <th data-translate="common.actions">الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="rawPunchesBody">
                                <!-- Raw punches rows will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- File Preview Modal -->
            <div id="filePreviewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
                <div class="director-panel max-w-4xl w-full mx-4 p-6 overflow-auto max-h-[80vh]">
                    <div class="director-panel-header">
                        <div class="director-panel-title">
                            <div class="director-panel-title-icon">
                                <i class="fas fa-eye"></i>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-900" id="modalFileTitle">File Preview</h3>
                            </div>
                        </div>
                        <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    <div id="modalFileDetails" class="mb-4 text-sm text-gray-700">
                        <!-- File details will be shown here -->
                    </div>
                    <div id="modalPreviewTable" class="table-wrapper max-h-96 overflow-y-auto">
                        <!-- Preview table will be populated here -->
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button id="modalCancelBtn" class="filter-button" data-translate="btn.cancel">
                            <i class="fas fa-times"></i>
                            <span data-translate="btn.cancel">Cancel</span>
                        </button>
                        <button id="modalSaveBtn" class="filter-button active" style="background: linear-gradient(135deg, #10b981, #059669); border-color: #059669;">
                            <i class="fas fa-save"></i>
                            <span data-translate="btn.save_to_database">Save to Database</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="director-panel p-6 max-w-sm w-full mx-4">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-600" id="loadingText">Processing...</p>
            </div>
        </div>
    </div>

    <!-- Success/Error Toast -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg border-l-4 p-4 max-w-sm">
            <div class="flex">
                <div class="flex-shrink-0">
                    <i id="toastIcon" class="text-xl"></i>
                </div>
                <div class="ml-3">
                    <p id="toastMessage" class="text-sm font-medium text-gray-900"></p>
                </div>
                <div class="ml-auto pl-3">
                    <button onclick="hideToast()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        // Merge page-specific translations into global translations object
        // (translations.js already declares the global translations object)
        if (typeof translations === 'undefined') {
            var translations = { en: {}, ar: {} };
        }
        
        // Ensure language objects exist
        if (!translations.en) translations.en = {};
        if (!translations.ar) translations.ar = {};
        
        // Merge page-specific translations
        Object.assign(translations.en, {
            'attendance.punch_management': 'Punch File Management',
            'attendance.punch_management_subtitle': 'Upload and manage punch attendance files with advanced processing',
            'attendance.upload_punch_file': 'Upload Punch File',
            'attendance.upload_section': 'Upload',
            'attendance.files_section': 'Files',
            'attendance.punches_section': 'Punches',
            'attendance.raw_punches': 'Raw Punches',
            'common.drag_drop_file': 'Drag & Drop .xls/.xlsx file here',
            'common.or_click_to_select': 'or click to select',
            'btn.upload_file': 'Upload File',
            'common.uploaded_files': 'Uploaded Files',
            'employee.employee': 'Employee',
            'time.year': 'Year',
            'time.month': 'Month',
            'btn.apply': 'Apply',
            'attendance.punch_time': 'Punch Time',
            'attendance.source': 'Source',
            'common.actions': 'Actions',
            'btn.edit': 'Edit',
            'btn.delete': 'Delete',

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect({ target: { files } });
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Validate file type
            const validTypes = ['application/vnd.ms-excel', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'];
            const isValidType = validTypes.includes(file.type) || file.name.match(/\.(xls|xlsx)$/i);

            if (!isValidType) {
                showToast('error', 'Please select a valid Excel file (.xls or .xlsx)');
                return;
            }

            // Validate file size (10MB limit)
            if (file.size > 10 * 1024 * 1024) {
                showToast('error', 'File size must be less than 10MB');
                return;
            }

            selectedFile = file;
            document.getElementById('uploadBtn').disabled = false;
            
            // Update dropzone text
            const dropzone = document.getElementById('dropzone');
            dropzone.innerHTML = `
                <div class="space-y-2">
                    <i class="fas fa-file-excel text-4xl text-green-500"></i>
                    <p class="text-gray-900 font-medium">${file.name}</p>
                    <p class="text-sm text-gray-500">${formatFileSize(file.size)}</p>
                </div>
            `;
        }

        async function uploadFile() {
            if (!selectedFile) return;

            const token = getToken();
            console.log('Token being sent:', token);

            const formData = new FormData();
            formData.append('punchFile', selectedFile);

            try {
                showProgress(0);

                const response = await fetch(`${ATTENDANCE_BASE}/api/punches/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                if (response.status === 401) {
                    // Handle authentication errors specifically
                    showToast('error', 'Authentication failed. Please log in again.');
                    // Redirect to login page
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    showProgress(100);
                    currentUploadId = result.upload.id;
                    showToast('success', 'File uploaded successfully');

                    // Parse the file
                    await parseFile(currentUploadId);

                    // Reload files list
                    loadUploadedFiles();
                } else {
                    throw new Error(result.error || 'Upload failed');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showToast('error', error.message);
            } finally {
                hideProgress();
            }
        }

        async function downloadFile(fileId) {
            try {
                const response = await fetch(`${ATTENDANCE_BASE}/api/punches/download/${fileId}`, {
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || 'file.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    throw new Error('Download failed');
                }
            } catch (error) {
                console.error('Download error:', error);
                showToast('error', error.message);
            }
        }

        async function deleteFile(fileId) {
            const confirmDeleteFileMsg = typeof translate === 'function' ? translate('message.confirm_delete_file') || 'Are you sure you want to delete this file and all associated punch records?' : 'Are you sure you want to delete this file and all associated punch records?';
            if (!confirm(confirmDeleteFileMsg)) {
                return;
            }

            try {
                const response = await fetch(`${ATTENDANCE_BASE}/api/punches/files/${fileId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    }
                });

                const result = await response.json();

                if (result.success) {
                    showToast('success', 'File deleted successfully');
                    loadUploadedFiles();
                } else {
                    throw new Error(result.error || 'Delete failed');
                }
            } catch (error) {
                console.error('Delete error:', error);
                showToast('error', error.message);
            }
        }

        async function viewFileDetails(fileId) {
            try {
                showLoading('Loading file details...');
                const response = await fetch(`${ATTENDANCE_BASE}/api/punches/parse/${fileId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`,
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    openFilePreviewModal(result.preview, fileId);
                } else {
                    throw new Error(result.error || 'Parsing failed');
                }
            } catch (error) {
                console.error('View details error:', error);
                showToast('error', error.message);
            } finally {
                hideLoading();
            }
        }

        // Utility functions
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDateTime(dateString) {
            return new Date(dateString).toLocaleString();
        }

        function getStatusColor(status) {
            switch (status) {
                case 'completed': return 'bg-green-100 text-green-800';
                case 'processing': return 'bg-yellow-100 text-yellow-800';
                case 'failed': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function showProgress(percent) {
            const container = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressText');
            
            container.classList.remove('hidden');
            bar.style.width = percent + '%';
            text.textContent = percent + '%';
        }

        function hideProgress() {
            document.getElementById('progressContainer').classList.add('hidden');
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingModal').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingModal').classList.add('hidden');
        }

        function showToast(type, message) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const messageEl = document.getElementById('toastMessage');
            
            if (type === 'success') {
                toast.className = 'fixed top-4 right-4 z-50';
                toast.firstElementChild.className = 'bg-white rounded-lg shadow-lg border-l-4 border-green-500 p-4 max-w-sm';
                icon.className = 'fas fa-check-circle text-xl text-green-500';
            } else {
                toast.className = 'fixed top-4 right-4 z-50';
                toast.firstElementChild.className = 'bg-white rounded-lg shadow-lg border-l-4 border-red-500 p-4 max-w-sm';
                icon.className = 'fas fa-exclamation-circle text-xl text-red-500';
            }
            
            messageEl.textContent = message;
            toast.classList.remove('hidden');
            
            setTimeout(hideToast, 5000);
        }

        function hideToast() {
            document.getElementById('toast').classList.add('hidden');
        }
    </script>
    <script src="../assets/js/navbar.js"></script>
</body>
