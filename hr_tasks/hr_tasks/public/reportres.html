        /* Enhanced Statistics Cards - Matching Tasks Tab */
        .stat-card {
            background: linear-gradient(160deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 20px;
            padding: 1.25rem 1.5rem;
            border: 2px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            min-height: 88px;
            min-width: 280px;
            flex: 1;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 20px 20px 0 0;
        }
        
        .stat-card.blue::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .stat-card.yellow::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .stat-card.purple::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        
        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1), 0 8px 16px rgba(0, 0, 0, 0.06);
            border-color: rgba(148, 163, 184, 0.35);
        }
        
        .stat-card:hover::after { opacity: 1; }
        
        .stat-card .flex.items-center { position: relative; z-index: 1; min-width: 0; }
        
        @media (max-width: 768px) {
            .stat-card {
                padding: 20px 16px;

    <script src="../../../frontend/assets/js/translations.js"></script>
    <script>
        // Translation helper function
        function t(key, fallback = '') {
            try {
                // First try: window.translate from translations.js (most reliable)
                if (typeof window !== 'undefined' && typeof window.translate === 'function') {
                    const translated = window.translate(key);
                    if (translated && translated !== key) return translated;
                }
                // Second try: global translate function
                if (typeof translate === 'function') {
                    const translated = translate(key);
                    if (translated && translated !== key) return translated;
                }
                // Third try: direct access to translations object if available
                if (typeof window !== 'undefined' && typeof translations !== 'undefined') {
                    const currentLang = window.currentLanguage || localStorage.getItem('language') || localStorage.getItem('lang') || 'ar';
                    if (translations[currentLang] && translations[currentLang][key]) {
                        return translations[currentLang][key];
                    }
                    // Fallback to English
                    if (translations['en'] && translations['en'][key]) {
                        return translations['en'][key];
                    }
                }
                // Final fallback
                return fallback || key;
            } catch (e) {
                console.warn('Translation error for key:', key, e);
                return fallback || key;
            }
        }
        
        // Determine API base URL - prefer parent window API, then check for hr_tasks service, fallback to port 3020
        const API = (() => {
            // Check parent window API_SERVICES first
            if (window.parent && window.parent.API_SERVICES && window.parent.API_SERVICES.hr_tasks) {
                return window.parent.API_SERVICES.hr_tasks;
            }
            // Check current window API_SERVICES
            if (window.API_SERVICES && window.API_SERVICES.hr_tasks) {
                return window.API_SERVICES.hr_tasks;
            }
            // Check for API_BASE
            if (window.API_BASE) {
                return window.API_BASE;
            }
            // If origin is a Live Server port (5500-5600), use port 3020 instead (avoid hitting static server on 5511)
            const port = parseInt(location.port, 10);
            if (port && port >= 5500 && port <= 5600) {
                return 'http://localhost:3020';
            }
            // Use origin if valid HTTP/HTTPS, otherwise default to port 3020
            return (location.origin && /^https?:\/\//i.test(location.origin)) ? location.origin : 'http://localhost:3020';
        })();
        let currentUser = null;
        let reports = [];
        
        let employees = [];
        let departments = [];
        let selectedRecipients = [];
let availableResponsibles = [];
let allEmployees = [];
let selectedEmployeeIds = [];
let currentView = 'received'; // 'received' or 'generated'

        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            // Language selector
            const languageSelector = document.getElementById('languageSelector');
            if (languageSelector) {
                languageSelector.value = (typeof currentLanguage !== 'undefined' ? currentLanguage : (window.currentLanguage || 'ar'));
                languageSelector.addEventListener('change', (e) => {
                    if (typeof setLanguage === 'function') {
                        setLanguage(e.target.value);
                    }
                    if (typeof updatePageTranslations === 'function') {
                        updatePageTranslations();
                    }
                });
            }
            
            // Initialize translations
            if (typeof updatePageTranslations === 'function') {
                updatePageTranslations();
            }
            
            // Listen for language changes
            document.addEventListener('languageChanged', function(e) {
                setTimeout(() => {
                    if (typeof updatePageTranslations === 'function') {
                        updatePageTranslations();
                    }
                    // Refresh reports display if loaded
                    if (reports && reports.length > 0) {
                        displayReports();
                    }
                    // Refresh modal content if open
                    const modal = document.getElementById('reportDetailsModal');
                    if (modal && !modal.classList.contains('hidden')) {
                        const reportId = modal.dataset.reportId;
                        if (reportId) {
                            viewReportDetails(reportId);
                        }
                    }
                }, 100);
            });
            
            await loadInitialData();
            await loadEmployeesForSelection();
            setupEventListeners();
            // Only load reports if we have a valid employee_id
            if (currentUser && currentUser.employee_id) {
                await loadReports();
            } else {
                console.warn('Cannot load reports: employee_id not available', {
                    currentUser: currentUser,
                    urlParams: Object.fromEntries(new URLSearchParams(window.location.search))
                });
            }
        });


        // Charger les accusés de réception pour un rapport
        async function loadAcknowledgements(reportId) {
            try {
                const response = await fetch(`${API}/api/rapportemp/${reportId}/acknowledgements`);
                if (!response.ok) {
                    throw new Error('Erreur lors du chargement des accusés');
                }
                const data = await response.json();
                return data.success ? data : { acknowledgements: [], total: 0, acknowledged: 0 };
            } catch (error) {
                console.error('Erreur lors du chargement des accusés:', error);
                return { acknowledgements: [], total: 0, acknowledged: 0 };
            }
        }

        // Charger les données initiales
       async function loadInitialData() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('user_id');
        let employeeId = urlParams.get('employee_id');
        let username = urlParams.get('username');
        let firstName = urlParams.get('first');
        let lastName = urlParams.get('last');
        let role = urlParams.get('role');

        // Try to get user data from localStorage if not in URL params
        if (!userId || !employeeId) {
            try {
                const storedUser = localStorage.getItem('user');
                if (storedUser) {
                    const userData = JSON.parse(storedUser);
                    userId = userId || userData.id || userData.userId;
                    employeeId = employeeId || userData.employeeId || userData.employee_id;
                    username = username || userData.username;
                    firstName = firstName || userData.firstName || userData.first_name;
                    lastName = lastName || userData.lastName || userData.last_name;
                    role = role || userData.role;
                }
            } catch (e) {
                console.warn('Failed to parse user from localStorage:', e);
            }
        }

        // Try to get from parent window if embedded
        if ((!userId || !employeeId) && window.parent && window.parent !== window) {
            try {
                if (window.parent.currentUser) {
                    userId = userId || window.parent.currentUser.user_id || window.parent.currentUser.id;
                    employeeId = employeeId || window.parent.currentUser.employee_id;
                    username = username || window.parent.currentUser.username;
                    firstName = firstName || window.parent.currentUser.first_name || window.parent.currentUser.firstName;
                    lastName = lastName || window.parent.currentUser.last_name || window.parent.currentUser.lastName;
                    role = role || window.parent.currentUser.role;
                }
            } catch (e) {
                // Cross-origin restriction, ignore
            }
        }

        // Initialiser currentUser
        currentUser = {
            id: userId || employeeId || '1',
            employee_id: employeeId,
            user_id: userId,
            username: username,
            first_name: firstName || 'Responsable',
            last_name: lastName || 'Département',
            role: role || 'Responsible'
        };

        // Helper: simple UUID check
        const isUuid = (v) => typeof v === 'string' && /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$/.test(v);

        // Si employee_id absent OU invalide mais user_id présent, récupérer l'employé lié
        if ((!currentUser.employee_id || !isUuid(currentUser.employee_id)) && currentUser.user_id) {
            try {
                const r = await fetch(`${API}/employees/by-user/${currentUser.user_id}`);
                if (r.ok) {
                    const data = await r.json();
                    if (data && data.success && data.employee) {
                        currentUser.employee_id = data.employee.id;
                        currentUser.department = data.employee.department_name || currentUser.department;
                        currentUser.first_name = currentUser.first_name || data.employee.first_name;
                        currentUser.last_name = currentUser.last_name || data.employee.last_name;
                    }
                }
            } catch (e) {
                console.warn('Failed to fetch employee by user_id:', e);
            }
        }

        // Récupérer en parallèle : tous les employés + détails du responsable
        // Use currentUser.employee_id instead of employeeId variable (which might not be updated)
        const finalEmployeeId = currentUser.employee_id || employeeId;
        const [employeesRes, employeeDetailsRes] = await Promise.all([
            fetch(`${API}/employees`).catch(() => null),  // Tous les employés
            finalEmployeeId ? fetch(`${API}/api/rapportemp/employees/${finalEmployeeId}/details`).catch(() => null) : null
        ]);

        // Stocker tous les employés
        employees = employeesRes && employeesRes.ok ? await employeesRes.json() : [];

        // Récupérer les détails du responsable
        if (employeeDetailsRes && employeeDetailsRes.ok) {
            const result = await employeeDetailsRes.json();
            if (result.success && result.employee) {
                currentUser.department = result.employee.department_name || 'Non spécifié';
                currentUser.email = result.employee.email;
            }
        }

        // Remplir la liste des employés dans l'interface
        populateEmployeesList(); // Assure-toi que cette fonction existe
        
        // Log current user state for debugging
        console.log('Current user loaded:', {
            id: currentUser.id,
            employee_id: currentUser.employee_id,
            user_id: currentUser.user_id,
            username: currentUser.username
        });
    } catch (error) {
        console.error('Erreur lors du chargement des données:', error);
    }
}

async function loadEmployeesForSelection() {
    try {
        const response = await fetch(`${API}/employees`);
        if (response.ok) {
            allEmployees = await response.json();
            populateEmployeeCheckboxes(allEmployees);
        }
    } catch (error) {
        console.error('Erreur chargement employés:', error);
    }
}

// Remplir les checkboxes d'employés
function populateEmployeeCheckboxes(employees) {
    const container = document.getElementById('employeesCheckboxContainer');
    if (!container) return;

    container.innerHTML = `
        <div class="space-y-2">
            ${employees.map(employee => `
                <label class="flex items-center p-2 hover:bg-gray-50 rounded cursor-pointer">
                    <input 
                        type="checkbox" 
                        value="${employee.id}" 
                        class="employee-checkbox rounded text-blue-600 focus:ring-blue-500"
                        onchange="toggleEmployeeSelection('${employee.id}', '${employee.first_name} ${employee.last_name}', this.checked)"
                    >
                    <span class="ml-2 text-sm">${employee.first_name} ${employee.last_name}</span>
                </label>
            `).join('')}
        </div>
    `;
}

// Filtrer les employés selon la recherche
function filterEmployees() {
    const searchTerm = document.getElementById('employeeSearch').value.toLowerCase();
    const filteredEmployees = allEmployees.filter(employee => 
        `${employee.first_name} ${employee.last_name}`.toLowerCase().includes(searchTerm)
    );
    populateEmployeeCheckboxes(filteredEmployees);
    
    // Re-check les employés déjà sélectionnés
    selectedEmployeeIds.forEach(id => {
        const checkbox = document.querySelector(`.employee-checkbox[value="${id}"]`);
        if (checkbox) checkbox.checked = true;
    });
}

// Gérer la sélection/désélection d'un employé
function toggleEmployeeSelection(id, name, isChecked) {
    if (isChecked) {
        if (!selectedEmployeeIds.includes(id)) {
            selectedEmployeeIds.push(id);
            addSelectedEmployeeBadge(id, name);
        }
    } else {
        selectedEmployeeIds = selectedEmployeeIds.filter(empId => empId !== id);
        removeSelectedEmployeeBadge(id);
    }
    
    // Afficher/masquer le container des sélections
    const selectedContainer = document.getElementById('selectedEmployees');
    selectedContainer.style.display = selectedEmployeeIds.length > 0 ? 'flex' : 'none';
}

// Ajouter un badge pour un employé sélectionné
function addSelectedEmployeeBadge(id, name) {
    const container = document.getElementById('selectedEmployees');
    const badge = document.createElement('div');
    badge.className = 'selected-employee-badge bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs flex items-center';
    badge.innerHTML = `
        ${name}
        <button type="button" onclick="removeEmployee('${id}')" class="ml-1 text-blue-600 hover:text-blue-800">
            <i class="fas fa-times"></i>
        </button>
    `;
    badge.dataset.employeeId = id;
    container.appendChild(badge);
}

// Retirer un badge d'employé sélectionné
function removeSelectedEmployeeBadge(id) {
    const badge = document.querySelector(`.selected-employee-badge[data-employee-id="${id}"]`);
    if (badge) badge.remove();
}

// Retirer un employé de la sélection
function removeEmployee(id) {
    // Décocher la checkbox
    const checkbox = document.querySelector(`.employee-checkbox[value="${id}"]`);
    if (checkbox) checkbox.checked = false;
    
    // Retirer de la liste des sélectionnés
    selectedEmployeeIds = selectedEmployeeIds.filter(empId => empId !== id);
    removeSelectedEmployeeBadge(id);
    
    // Cacher le container si vide
    const selectedContainer = document.getElementById('selectedEmployees');
    selectedContainer.style.display = selectedEmployeeIds.length > 0 ? 'flex' : 'none';
}

// Récupérer les employés sélectionnés pour le formulaire
function getSelectedEmployees() {
    return selectedEmployeeIds;
}

// Réinitialiser la sélection quand le modal est fermé
function resetEmployeeSelection() {
    selectedEmployeeIds = [];
    const container = document.getElementById('selectedEmployees');
    if (container) {
        container.innerHTML = '';
        container.style.display = 'none';
    }
    // Décocher toutes les checkboxes (s'il en existe encore dans le DOM)
    document.querySelectorAll('.employee-checkbox').forEach(checkbox => {
        checkbox.checked = false;
    });
    // Réinitialiser la recherche si présente
    const search = document.getElementById('employeeSearch');
    if (search) {
        search.value = '';
        populateEmployeeCheckboxes(allEmployees);
    }
}
async function loadResponsibles() {
    try {
        const response = await fetch(`${API}/api/rapportemp/responsibles`);
        if (!response.ok) {
            throw new Error('Impossible de charger les responsables');
        }
        
        const data = await response.json();
        
        if (!data.success || !data.responsibles) {
            throw new Error('Format de réponse invalide');
        }
        
        availableResponsibles = data.responsibles;
        
        // Remplir le sélecteur de destinataires
        populateResponsiblesList();
        
        return true;
    } catch (error) {
        console.error('Erreur chargement responsibles:', error);
        return false;
    }
}

// NOUVELLES FONCTIONS À AJOUTER

// Remplir la liste avec cases + support du filtre
function populateResponsiblesList(items = availableResponsibles) {
    const listEl = document.getElementById('responsiblesList');
    if (!listEl) return;
    const sanitized = (items || [])
        .filter(resp => resp.id !== (currentUser && currentUser.employee_id));
    if (sanitized.length === 0) {
        listEl.innerHTML = `<div class="text-xs text-gray-500 p-2">${t('report.no_responsible_available', 'Aucun responsable disponible')}</div>`;
        return;
    }
    listEl.innerHTML = sanitized.map(resp => `
        <label class="flex items-center justify-between px-3 py-2 hover:bg-gray-50 cursor-pointer">
            <div class="flex items-center">
                <input type="checkbox" class="recipient-checkbox rounded text-blue-600 focus:ring-blue-500" onchange="onResponsibleToggle(this, '${resp.id}', '${resp.first_name} ${resp.last_name}', '${resp.department_name || ''}')">
                <div class="ml-3">
                    <div class="text-sm font-medium text-gray-900">${resp.first_name} ${resp.last_name}</div>
                    <div class="text-xs text-gray-500">${resp.department_name || t('report.not_specified', 'Département non spécifié')}</div>
                </div>
            </div>
        </label>
    `).join('');
    // re-check déjà sélectionnés
    sanitized.forEach(resp => {
        const checked = selectedRecipients.some(r => r.id === resp.id);
        const input = listEl.querySelector(`input[type="checkbox"][onchange*="'${resp.id}'"]`);
        if (input) input.checked = checked;
    });
}

function filterResponsibles() {
    const term = (document.getElementById('responsibleSearch')?.value || '').toLowerCase();
    const filtered = (availableResponsibles || []).filter(r => `${r.first_name} ${r.last_name}`.toLowerCase().includes(term)
        || (r.department_name || '').toLowerCase().includes(term));
    populateResponsiblesList(filtered);
}

function onResponsibleToggle(el, id, name, department) {
    if (el.checked) {
        if (!selectedRecipients.some(r => r.id === id)) {
            selectedRecipients.push({ id, type: 'responsible', name, department });
        }
    } else {
        selectedRecipients = selectedRecipients.filter(r => r.id !== id);
    }
    updateRecipientDisplay();
}

// Basculer l'affichage du sélecteur
// plus de toggle: la liste est visible en permanence dans le champ combiné
function toggleRecipientSelector() {
    // Stub function - selector is always visible now, but kept for compatibility
    const selector = document.getElementById('recipientSelector');
    if (selector) {
        const isVisible = selector.style.display !== 'none';
        selector.style.display = isVisible ? 'none' : 'block';
    }
}

// Sélectionner/désélectionner un destinataire
function toggleRecipientSelection(id, type, name, department) {
    const existingIndex = selectedRecipients.findIndex(r => r.id === id);
    
    if (existingIndex > -1) {
        // Désélectionner
        selectedRecipients.splice(existingIndex, 1);
    } else {
        // Sélectionner
        selectedRecipients.push({
            id: id,
            type: type,
            name: name,
            department: department
        });
    }
    
    updateRecipientDisplay();
    updateRecipientCheckboxes();
}

// Mettre à jour l'affichage des destinataires sélectionnés
function updateRecipientDisplay() {
    const container = document.getElementById('selectedRecipients');
    const hiddenInput = document.getElementById('recipientIds');
    
    if (!container || !hiddenInput) return;
    
    // Mettre à jour les tags visuels
    container.innerHTML = selectedRecipients.map((recipient, index) => `
        <div class="recipient-tag">
            <span>${recipient.name}${recipient.department ? ` (${recipient.department})` : ''}</span>
            <button type="button" onclick="removeRecipient(${index})" title="Supprimer">
                <i class="fas fa-times"></i>
            </button>
        </div>
    `).join('');
    
    // Mettre à jour le champ caché pour validation
    const recipientIds = selectedRecipients
        .filter(r => r.id) // Exclure le directeur général qui n'a pas d'ID
        .map(r => r.id);
    hiddenInput.value = recipientIds.length > 0 || selectedRecipients.some(r => r.type === 'director') ? 'valid' : '';
}

// Nouvelle fonction pour formater l'affichage du destinataire
function formatRecipientDisplay(remarks) {
    if (!remarks) return 'Non spécifié';
    
    // Si les remarques contiennent le format "Destinataire: Nom (ID: ...)"
    if (remarks.includes('Destinataire:') && remarks.includes('(')) {
        // Extraire le nom du responsable depuis les remarques
        const match = remarks.match(/Destinataire: ([^(]+)/);
        if (match && match[1]) {
            return match[1].trim();
        }
    }
    
    // Fallback pour les anciens formats
    if (remarks.startsWith('Destinataire:')) {
        return remarks.replace('Destinataire:', '').split('(')[0].trim();
    }
    
    return remarks;
}
async function generateReport(e) {
  e.preventDefault();
  
  if (!currentUser || !currentUser.employee_id) {
    showNotification('Utilisateur non identifié', 'error');
    return;
  }

  // Récupérer les IDs des responsables sélectionnés
  const responsibleIds = selectedRecipients
    .filter(r => r.type === 'responsible' && r.id)
    .map(r => r.id);
  
  // Directeur auto-inclus côté serveur, pas besoin de permettre le contrôle côté UI
  const hasDirector = true;

  if (responsibleIds.length === 0 && !hasDirector) {
    showNotification('Veuillez sélectionner au moins un destinataire', 'warning');
    return;
  }

  const reportData = {
    employee_id: currentUser.employee_id,
    title: document.getElementById('reportTitle').value,
    subject: document.getElementById('reportSubject').value,
    content: document.getElementById('reportContent').value,
    recipients: responsibleIds,
    include_director: hasDirector,
    concerned_employees: []
  };

  // Le reste du code reste inchangé...
  try {
    const response = await fetch(`${API}/api/rapportemp/create`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(reportData)
    });

    let result;
    try {
      result = await response.json();
    } catch (_) {
      result = {};
    }

    if (!response.ok) {
      const serverMsg = result.details || result.error;
      throw new Error(serverMsg || `Erreur HTTP ${response.status}`);
    }

    if (result.success) {
      showNotification('Rapport généré avec succès !', 'success');
      closeReportModal();
      loadReports();
      selectedRecipients = [];
      updateRecipientDisplay();
    } else {
      showNotification('Erreur: ' + (result.error || 'Impossible de générer le rapport'), 'error');
    }
    
  } catch (error) {
    console.error('Erreur lors de la génération du rapport:', error);
    const message = (error && error.message) || 'Inconnue';
    showNotification('Erreur lors de la génération du rapport: ' + message, 'error');
  }
}

        // Accuser réception d'un rapport
        async function acknowledgeReport(reportId) {
            try {
                const response = await fetch(`${API}/api/rapportemp/${reportId}/acknowledge`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        acknowledged_by: currentUser.employee_id
                    })
                });

                if (!response.ok) {
                    throw new Error('Erreur lors de l\'accusé de réception');
                }

                const result = await response.json();
                if (result.success) {
                    // Mettre à jour le rapport dans la liste locale
                    const reportIndex = reports.findIndex(r => r.id === reportId);
                    if (reportIndex !== -1) {
                        reports[reportIndex].status = 'acknowledged';
                    }

                    // Rafraîchir l'affichage
                    updateStatistics();
                    displayReports();

                    // Notification de succès
                    showNotification('Accusé de réception envoyé avec succès', 'success');

                    // Recharger les détails si le modal est ouvert
                    if (!document.getElementById('reportDetailsModal').classList.contains('hidden')) {
                        await viewReportDetails(reportId);
                    }
                } else {
                    throw new Error(result.error || 'Erreur inconnue');
                }
            } catch (error) {
                console.error('Erreur accusé réception:', error);
                showNotification('Erreur lors de l\'accusé de réception: ' + error.message, 'error');
            }
        }

        // Accuser réception de tous les rapports en attente
        async function acknowledgeAllPendingReports() {
            const pendingReports = reports.filter(r => r.status === 'pending');
            
            if (pendingReports.length === 0) {
                showNotification('Aucun rapport en attente', 'info');
                return;
            }

            if (!confirm(`Voulez-vous vraiment accuser réception de tous les ${pendingReports.length} rapports en attente ?`)) {
                return;
            }

            const btn = document.getElementById('acknowledgeAllBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loading-spinner"></div> Traitement...';
            btn.disabled = true;

            try {
                let successCount = 0;
                let errorCount = 0;

                for (const report of pendingReports) {
                    try {
                        await acknowledgeReport(report.id);
                        successCount++;
                    } catch (error) {
                        errorCount++;
                        console.error(`Erreur pour rapport ${report.id}:`, error);
                    }
                }

                if (successCount > 0) {
                    showNotification(`${successCount} rapports accusés avec succès${errorCount > 0 ? `, ${errorCount} erreurs` : ''}`, 
                                   successCount > errorCount ? 'success' : 'warning');
                } else {
                    showNotification('Aucun rapport n\'a pu être accusé', 'error');
                }
            } catch (error) {
                console.error('Erreur accusé global:', error);
                showNotification('Erreur lors du traitement global', 'error');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        // Voir les détails d'un rapport
        async function viewReportDetails(reportId) {

                    throw new Error('Rapport non trouvé');
                }

                const result = await response.json();
                const report = result.report;

                // Charger les informations des accusés de réception
                const acknowledgementsData = await loadAcknowledgements(reportId);
                const acknowledgements = acknowledgementsData.acknowledgements || [];
                const acknowledgedCount = acknowledgementsData.acknowledged || 0;
                const totalRecipients = acknowledgementsData.total || 0;

                const modalContent = document.getElementById('modalContent');
                modalContent.innerHTML = `
                    <!-- Report Information Section -->

                        <div class="modal-info-grid">
                            <div class="modal-info-item">

                                    <i class="fas fa-file-alt"></i>
                                </div>
                                <div class="modal-info-content">
                                    <div class="modal-info-label">${t('report.title_label_modal', 'Titre')}</div>
                                    <div class="modal-info-value">${report.title || t('report.not_specified', 'Non spécifié')}</div>
                                </div>
                            </div>
                            <div class="modal-info-item">
                                <div class="modal-info-icon ${report.status === 'acknowledged' ? 'green' : 'orange'}">

                                </div>
                                <div class="modal-info-content">

                                    </div>
                                </div>
                            </div>
                            <div class="modal-info-item">
                                <div class="modal-info-icon purple">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div class="modal-info-content">
                                    <div class="modal-info-label">${t('report.from', 'De')}</div>
                                    <div class="modal-info-value">${report.first_name} ${report.last_name}</div>
                                </div>
                            </div>
                            <div class="modal-info-item">
                                <div class="modal-info-icon green">
                                    <i class="fas fa-calendar"></i>
                                </div>
                                <div class="modal-info-content">
                                    <div class="modal-info-label">${t('report.date', 'Date')}</div>
                                    <div class="modal-info-value">${formatDateTime(report.created_at)}</div>
                                </div>
                            </div>
                            <div class="modal-info-item">
                                <div class="modal-info-icon blue">
                                    <i class="fas fa-building"></i>
                                </div>
                                <div class="modal-info-content">
                                    <div class="modal-info-label">${t('report.department_label', 'Département')}</div>
                                    <div class="modal-info-value">${report.department_name || t('report.not_specified', 'Non spécifié')}</div>
                                </div>
                            </div>
                            ${report.subject ? `
                                <div class="modal-info-item">
                                    <div class="modal-info-icon purple">
                                        <i class="fas fa-tag"></i>
                                    </div>
                                    <div class="modal-info-content">
                                        <div class="modal-info-label">${t('report.subject_label', 'Sujet')}</div>
                                        <div class="modal-info-value">${report.subject}</div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        ${report.content ? `
                            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(148, 163, 184, 0.15);">
                                <div class="modal-info-label" style="margin-bottom: 12px;">${t('report.report_content', 'Contenu')}</div>
                                <div style="background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); padding: 16px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.1); line-height: 1.6; color: #334155; white-space: pre-wrap;">${report.content}</div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <!-- Section Accusés de réception -->
                    <div class="modal-acknowledgements-section">
                        <div class="modal-acknowledgements-header">
                            <i class="fas fa-check-double"></i>
                            <h4>${t('report.acknowledgements_label', 'Accusés de réception')}</h4>
                        </div>
                        <div style="background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid rgba(16, 185, 129, 0.2);">
                            <p style="font-size: 0.875rem; font-weight: 600; color: #059669; margin: 0;">
                                <i class="fas fa-info-circle"></i> ${acknowledgedCount}/${totalRecipients} ${t('report.recipients_acknowledged', 'destinataires ont accusé réception')}
                            </p>
                        </div>
                        ${acknowledgements.length > 0 ? `
                            <div>
                                ${acknowledgements.map(ack => `
                                    <div class="acknowledgement-item">

                                            <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.875rem; font-weight: 700;">
                                                ${(ack.first_name || '').charAt(0).toUpperCase()}${(ack.last_name || '').charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <div style="font-weight: 600; color: #0f172a; font-size: 0.9rem;">${ack.first_name} ${ack.last_name}</div>
                                                ${ack.department_name ? `<div style="font-size: 0.75rem; color: #64748b;">${ack.department_name}</div>` : ''}
                                            </div>
                                        </div>
                                        <div class="acknowledgement-status ${ack.acknowledged ? 'acknowledged' : 'pending'}">
                                            ${ack.acknowledged ? `

                        ` : `

                                <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 8px; opacity: 0.5;"></i>
                                <p style="font-size: 0.875rem; margin: 0;">${t('report.no_recipients', 'Aucun destinataire spécifié')}</p>
                            </div>
                        `}
                    </div>
                `;

                // Gérer le bouton d'accusé de réception dans le modal
                const modalAckBtn = document.getElementById('modalAcknowledgeBtn');
                if (report.status === 'pending' && currentView === 'received') {
                    modalAckBtn.classList.remove('hidden');
                    modalAckBtn.onclick = () => {
                        acknowledgeReport(reportId);
                        closeReportDetails();
                    };
                } else {
                    modalAckBtn.classList.add('hidden');
                }

                const modal = document.getElementById('reportDetailsModal');
                modal.dataset.reportId = reportId; // Store report ID for language refresh
                modal.classList.remove('hidden');
                document.body.classList.add('overflow-hidden');

                console.error('Erreur lors du chargement des détails:', error);
                showNotification('Impossible de charger les détails du rapport: ' + error.message, 'error');
            }

        // Fermer le modal des détails
        function closeReportDetails() {
            const modal = document.getElementById('reportDetailsModal');
            if (modal) {
                modal.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            }
        }

        // Obtenir les rapports filtrés
        function getFilteredReports() {
            let filtered = [...reports];
            
            const statusFilter = document.querySelector('.filter-button[data-status].active')?.dataset.status;
            if (statusFilter && statusFilter !== 'all') {
                filtered = filtered.filter(r => r.status === statusFilter);
            }
            
            const periodFilter = document.querySelector('.filter-button[data-period].active')?.dataset.period;
            if (periodFilter && periodFilter !== 'all') {
                const now = new Date();
                filtered = filtered.filter(r => {
                    const reportDate = new Date(r.created_at);
                    switch (periodFilter) {
                        case 'today':
                            return reportDate.toDateString() === now.toDateString();
                        case 'week':
                            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                            return reportDate >= weekAgo;
                        case 'month':
                            return reportDate.getMonth() === now.getMonth() && reportDate.getFullYear() === now.getFullYear();
                        default:
                            return true;
                    }
                });
            }
            
            // Période personnalisée
            const startVal = document.getElementById('customStart')?.value;
            const endVal = document.getElementById('customEnd')?.value;
            if (startVal || endVal) {
                const start = startVal ? new Date(startVal) : null;
                const end = endVal ? new Date(endVal) : null;
                if (end) end.setHours(23, 59, 59, 999);
                filtered = filtered.filter(r => {
                    const d = new Date(r.created_at);
                    if (start && d < start) return false;
                    if (end && d > end) return false;
                    return true;
                });
            }

            // Filtre par recherche texte
            const term = document.getElementById('textSearch')?.value?.trim().toLowerCase();
            if (term) {
                filtered = filtered.filter(r => {
                    const recipientDisplay = r.remarks ? r.remarks.split('|')[0].trim() : '';
                    const haystack = [
                        r.title,
                        r.subject,
                        recipientDisplay,
                        r.remarks,
                        r.content,
                        r.employee_name,
                        r.department_name
                    ]
                    .filter(Boolean)
                    .join(' ')
                    .toLowerCase();
                    return haystack.includes(term);
                });
            }

            return filtered;
        }

        // Appliquer les filtres
        function applyFilters() {
            displayReports();
        }

        // Obtenir la classe CSS du statut
        function getStatusClass(status) {
            const classes = {
                'acknowledged': 'bg-green-100 text-green-800',
                'pending': 'bg-yellow-100 text-yellow-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        // Obtenir le texte du statut
        function getStatusText(status) {
            const texts = {
                'acknowledged': t('report.acknowledged', 'Accusé de réception'),
                'pending': t('report.pending', 'En attente')
            };
            return texts[status] || t('report.not_specified', 'Inconnu');
        }

        // Formater la date
        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('fr-FR');
        }

        function formatDateTime(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Afficher une notification
        function showNotification(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-all duration-300 transform translate-x-full`;
            notification.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-triangle' : type === 'warning' ? 'exclamation-circle' : 'info-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.remove('translate-x-full');
            }, 100);
            
            setTimeout(() => {
                notification.classList.add('translate-x-full');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 4000);
        }

        // Fonctions globales
        window.acknowledgeReport = acknowledgeReport;
        window.viewReportDetails = viewReportDetails;
        window.closeReportDetails = closeReportDetails;
         window.viewReport = viewReport;
        window.toggleRecipientSelector = toggleRecipientSelector;
window.toggleRecipientSelection = toggleRecipientSelection;
window.selectRecipientType = selectRecipientType;
window.clearAllRecipients = clearAllRecipients;
window.removeRecipient = removeRecipient;
    </script>

<script>
// Language sync from parent frame
window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'languageChanged') {
        var lang = event.data.language || event.data.lang;
        if (!lang) return;
        if (typeof window.setLanguage === 'function') {
            window.setLanguage(lang);
        } else {
            localStorage.setItem('language', lang);
            localStorage.setItem('lang', lang);
            if (typeof window.updatePageTranslations === 'function') {
                window.updatePageTranslations();
            }
        }
    }
});
</script>
