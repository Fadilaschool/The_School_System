<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks List View Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            background: #f8fafc;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .view-mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(248, 250, 252, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .view-mode-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #64748b;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .view-mode-btn:hover {
            background: rgba(241, 245, 249, 0.8);
            color: #1f2937;
        }

        .view-mode-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        /* Premium Table Styling */
        .premium-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #ffffff;
        }

        .premium-table thead {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }

        .premium-table thead th {
            padding: 20px 24px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }

        .premium-table tbody tr {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid #f1f5f9;
            background: #ffffff;
        }

        .premium-table tbody tr:hover {
            background: linear-gradient(120deg, rgba(99, 102, 241, 0.08), rgba(244, 114, 182, 0.08));
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
            border-left: 4px solid #6366f1;
        }

        .premium-table tbody td {
            padding: 18px 24px;
            font-size: 0.9rem;
            color: #334155;
        }

        .task-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .dir-table-action {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dir-table-action:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Tasks List - View Mode Test</h1>
            <div class="view-mode-toggle">
                <button id="gridBtn" class="view-mode-btn active">
                    <i class="fas fa-border-all"></i>
                    <span>Grid</span>
                </button>
                <button id="listBtn" class="view-mode-btn">
                    <i class="fas fa-list"></i>
                    <span>List</span>
                </button>
            </div>
        </div>

        <div id="tasksContainer"></div>
    </div>

    <script>
        const sampleTasks = [
            { id: 1, title: 'Complete Project Report', description: 'Finish the Q4 project report', status: 'In Progress', priority: 'High', assignee: 'John Doe', dueDate: '2026-02-20' },
            { id: 2, title: 'Review Code Changes', description: 'Review PR #123', status: 'Pending', priority: 'Medium', assignee: 'Jane Smith', dueDate: '2026-02-18' },
            { id: 3, title: 'Update Documentation', description: 'Update API documentation', status: 'Completed', priority: 'Low', assignee: 'Bob Johnson', dueDate: '2026-02-15' },
        ];

        let currentView = 'grid';

        function renderGrid() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = sampleTasks.map(task => `
                <div class="task-card">
                    <h3>${task.title}</h3>
                    <p>${task.description}</p>
                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                        <span class="badge badge-${task.status === 'Completed' ? 'success' : task.status === 'In Progress' ? 'warning' : 'danger'}">${task.status}</span>
                        <span class="badge badge-${task.priority === 'High' ? 'danger' : task.priority === 'Medium' ? 'warning' : 'success'}">${task.priority}</span>
                    </div>
                    <p style="margin-top: 8px; font-size: 0.875rem; color: #64748b;">
                        <strong>Assignee:</strong> ${task.assignee} | <strong>Due:</strong> ${task.dueDate}
                    </p>
                </div>
            `).join('');
        }

        function renderList() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = `
                <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <table class="premium-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Assignee</th>
                                <th>Due Date</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sampleTasks.map(task => `
                                <tr>
                                    <td>
                                        <div style="font-weight: 600;">${task.title}</div>
                                        <div style="font-size: 0.875rem; color: #64748b;">${task.description}</div>
                                    </td>
                                    <td><span class="badge badge-${task.status === 'Completed' ? 'success' : task.status === 'In Progress' ? 'warning' : 'danger'}">${task.status}</span></td>
                                    <td><span class="badge badge-${task.priority === 'High' ? 'danger' : task.priority === 'Medium' ? 'warning' : 'success'}">${task.priority}</span></td>
                                    <td>${task.assignee}</td>
                                    <td>${task.dueDate}</td>
                                    <td style="text-align: right;">
                                        <button class="dir-table-action"><i class="fas fa-eye"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function switchView(view) {
            console.log('Switching to view:', view);
            currentView = view;

            const gridBtn = document.getElementById('gridBtn');
            const listBtn = document.getElementById('listBtn');

            if (view === 'grid') {
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
                renderGrid();
            } else {
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
                renderList();
            }
        }

        // Initialize
        document.getElementById('gridBtn').addEventListener('click', () => switchView('grid'));
        document.getElementById('listBtn').addEventListener('click', () => switchView('list'));

        // Render initial view
        renderGrid();
    </script>

<script>
// Language sync from parent frame
window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'languageChanged') {
        var lang = event.data.language || event.data.lang;
        if (!lang) return;
        if (typeof window.setLanguage === 'function') {
            window.setLanguage(lang);
        } else {
            localStorage.setItem('language', lang);
            localStorage.setItem('lang', lang);
            if (typeof window.updatePageTranslations === 'function') {
                window.updatePageTranslations();
            }
        }
    }
});
</script>
</body>

</html>
