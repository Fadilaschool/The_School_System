<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الإشارات المستلمة - المسؤول</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.06), transparent 45%), #f5f7fb;
      min-height: 100vh;
      padding: 24px;
      color: #0f172a;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Page Header - Matching complaints_director.html */
    .page-hero {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem 0;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .page-hero-content {
      position: relative;
      z-index: 1;
    }

    .page-hero-title {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0 0 0.75rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .page-hero-title i,
    .page-hero-title::before {
      color: #3b82f6;
      font-size: 1.75rem;
    }

    .page-hero-subtitle {
      font-size: 1rem;
      color: #64748b;
      margin: 0;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .page-hero-title {
        font-size: 1.5rem;
        flex-direction: column;
        gap: 0.5rem;
      }

      .page-hero-title i,
      .page-hero-title::before {
        font-size: 1.5rem;
      }

      .page-hero-subtitle {
        font-size: 0.875rem;
      }
    }

    /* Director-Style Toolbar Section */
    .action-buttons-section {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      padding: 18px 22px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      min-height: 80px;
    }

    .primary-actions,
    .secondary-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Director-Style Tab Pills */
    .secondary-actions {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
      direction: rtl;
    }

    .stat-card {
      background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 24px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(148, 163, 184, 0.15);
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.02);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
      border-radius: 24px 24px 0 0;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 55%);
      pointer-events: none;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.12), 0 8px 16px rgba(15, 23, 42, 0.06);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-card.total {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      color: white;
      border-color: rgba(6, 182, 212, 0.3);
    }

    .stat-card.total::before {
      background: linear-gradient(90deg, #06b6d4 0%, #0891b2 50%, #06b6d4 100%);
    }

    .stat-card.total::after {
      background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.2), transparent 55%);
    }

    .stat-card.pending {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      border-color: rgba(245, 158, 11, 0.3);
    }

    .stat-card.pending::before {
      background: linear-gradient(90deg, #f59e0b 0%, #d97706 50%, #f59e0b 100%);
    }

    .stat-card.pending::after {
      background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.2), transparent 55%);
    }

    .stat-card.treated {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border-color: rgba(16, 185, 129, 0.3);
    }

    .stat-card.treated::before {
      background: linear-gradient(90deg, #10b981 0%, #059669 50%, #10b981 100%);
    }

    .stat-card.treated::after {
      background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.2), transparent 55%);
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.95;
      font-weight: 600;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* Card - Matching director-dashboard-stats.html */
    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 24px 24px 20px;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(15, 23, 42, 0.06);
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg,
        rgba(37, 99, 235, 0.12),
        rgba(124, 58, 237, 0.08),
        rgba(56, 189, 248, 0.08));
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 45px rgba(15, 23, 42, 0.12);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: #1f2937;
      margin: 0;
    }

    .card-title-icon {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(99, 102, 241, 0.35));
      color: #4338ca;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      color: #1e293b;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input,
    select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #0f172a;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    input:hover,
    select:hover {
      border-color: #cbd5e1;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12), 0 4px 16px rgba(59, 130, 246, 0.15);
      background: #ffffff;
      transform: translateY(-1px);
    }

    /* Premium Button Styling - Director Style */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn i {
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.85rem;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3);
      filter: brightness(1.1);
    }

    .btn-secondary {
      border-radius: 999px;
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #475569;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }

    .btn-secondary:hover {
      background: rgba(241, 245, 249, 0.8);
      color: #1f2937;
    }

    .btn-secondary.nav-btn.active {
      background: linear-gradient(120deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.25);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 10px 20px;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      padding: 10px 20px;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    }

    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
    }

    .signals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
    }

    .signals-grid[data-view-mode="table"] {
      display: block;
    }

    .signal-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.95));
      border-radius: 24px;
      padding: 22px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.07);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .signal-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 55%);
      pointer-events: none;
    }

    .signal-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 45px rgba(15, 23, 42, 0.12);
    }

    .signal-card.pending {
      border-color: rgba(245, 158, 11, 0.2);
    }

    .signal-card.pending::after {
      background: radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 55%);
    }

    .signal-card.treated {
      border-color: rgba(16, 185, 129, 0.2);
    }

    .signal-card.treated::after {
      background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.12), transparent 55%);
    }

    .signal-header {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 16px;
    }

    .signal-type {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
      position: relative;
      z-index: 1;
    }

    .signal-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .signal-employee {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .signal-title {
      font-size: 18px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .signal-desc {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .signal-location {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .signal-date {
      color: #cbd5e1;
      font-size: 12px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .signal-photo {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .signal-actions {
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .alert {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      animation: slideIn 0.3s ease;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border-right: 4px solid #10b981;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border-right: 4px solid #ef4444;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-state svg {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      opacity: 0.4;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      width: min(1200px, 96vw);
      max-height: 86vh;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .modal-body {
      padding: 16px;
      overflow: auto;
    }

    .loc-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .loc-chip {
      background: #f1f5f9;
      color: #0f172a;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .loc-section {
      margin-bottom: 18px;
    }

    .loc-section-title {
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .loc-floor {
      margin: 10px 0 6px;
      color: #334155;
      font-weight: 700;
      font-size: 14px;
    }

    .loc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .loc-card {
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .loc-card .code {
      font-weight: 800;
      color: #0f172a;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .loc-card .meta {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .loc-card .desc {
      color: #334155;
      font-size: 13px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 999px;
      background: #ecfeff;
      color: #155e75;
      font-weight: 700;
    }

    /* Director-Style Section Toggle */
    .section-toggle {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
      margin: 0 0 24px 0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .section-btn {
      border-radius: 999px;
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #475569;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }

    .section-btn.active {
      background: linear-gradient(120deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.25);
    }

    .section-btn:not(.active):hover {
      background: rgba(241, 245, 249, 0.8);
      color: #1f2937;
    }

    .section-content {
      display: none;
    }

    .section-content.active {
      display: block;
    }

    /* Director-Style View Controls */
    .view-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .view-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
    }

    .toggle-btn {
      border: none;
      background: transparent;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-btn.active {
      background: linear-gradient(120deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.25);
    }

    .toggle-btn:not(.active):hover {
      background: rgba(241, 245, 249, 0.8);
      color: #1f2937;
    }

    .rows-per-page {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rows-per-page label {
      font-size: 0.85rem;
      color: #475569;
      font-weight: 600;
    }

    .rows-per-page select {
      width: auto;
      min-width: 80px;
      padding: 8px 12px;
      font-size: 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      background: #ffffff;
    }

    /* Director-Style Table */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
    }

    table.signals-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 820px;
      background: #ffffff;
    }

    table.signals-table thead {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      border-bottom: 2px solid rgba(148, 163, 184, 0.2);
    }

    table.signals-table thead th {
      padding: 18px 24px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #64748b;
      text-align: right;
      background: transparent;
    }

    table.signals-table tbody tr {
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    table.signals-table tbody tr:hover {
      background: linear-gradient(120deg, rgba(59, 130, 246, 0.04), rgba(124, 58, 237, 0.04));
      border-left: 4px solid #3B82F6;
    }

    table.signals-table tbody tr:last-child {
      border-bottom: none;
    }

    table.signals-table tbody td {
      padding: 20px 24px;
      font-size: 0.9rem;
      color: #475569;
      background: transparent;
    }

    .sort-btn {
      border: none;
      background: transparent;
      font-weight: 700;
      color: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sort-btn:hover {
      color: #3b82f6;
    }

    .sort-indicator {
      font-size: 0.75rem;
      opacity: 0.7;
      transition: all 0.2s ease;
    }

    /* Director-Style Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .pagination-info {
      font-size: 0.85rem;
      color: #64748b;
      margin: 0 12px;
      font-weight: 500;
    }

    .pagination-btn {
      padding: 10px 16px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 40px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.02);
    }

    .pagination-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #3b82f6;
      color: #3b82f6;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination-btn.active {
      background: linear-gradient(120deg, #2563eb, #7c3aed);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    .pagination-btn.page-number {
      min-width: 40px;
    }
  </style>
  <script src="auth.js"></script>
  <script src="signals-nav.js"></script>
</head>

<body>
  <div class="container">
    <!-- Page Hero Section -->
    <div class="page-hero">
      <div class="page-hero-content">
        <h1 class="page-hero-title">📬 الإشارات المستلمة</h1>
        <p class="page-hero-subtitle">إدارة ومتابعة الإشارات</p>
      </div>
    </div>

    <!-- Action Buttons Section -->
    <div class="action-buttons-section">
      <div class="primary-actions">
        <button class="btn btn-primary" id="viewLocalisationsBtn">
          <i class="fas fa-map-marker-alt"></i>
          عرض المواقع
        </button>
        <button class="btn btn-primary" id="openAddSignalBtn">
          <i class="fas fa-plus-circle"></i>
          إضافة إشارة
        </button>
      </div>
      <div class="secondary-actions">
        <button class="btn btn-secondary nav-btn active" data-nav="signals">
          <i class="fas fa-list"></i>
          الإشارات
        </button>
        <button class="btn btn-secondary nav-btn" data-nav="settings">
          <i class="fas fa-cog"></i>
          الإعدادات
        </button>
        <button class="btn btn-secondary nav-btn" data-nav="statistics">
          <i class="fas fa-chart-bar"></i>
          الإحصائيات
        </button>
      </div>
    </div>

    <div id="alert"></div>

    <div class="stats">
      <div class="stat-card total">
        <div class="stat-label">إجمالي الإشارات</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-label">قيد المعالجة</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
      <div class="stat-card treated">
        <div class="stat-label">تمت المعالجة</div>
        <div class="stat-value" id="statTreated">0</div>

    <div class="card">
      <h2 class="card-title">الفلاتر</h2>
      <div class="filters">
        <div class="form-group">
          <label class="form-label">نوع الإشارة</label>
          <select id="typeId">
            <option value="">جميع الأنواع</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الحالة</label>
          <select id="status">
            <option value="">الكل</option>
            <option value="pending">قيد المعالجة</option>
            <option value="treated">تمت المعالجة</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">من تاريخ</label>
          <input id="from" type="date">

        <div class="form-group">
          <label class="form-label">إلى تاريخ</label>
          <input id="to" type="date">

        <div class="form-group">
          <label class="form-label">بحث</label>

        <div class="form-group" style="display:flex;align-items:flex-end">
          <button class="btn btn-primary" id="applyBtn" style="width:100%;display:none;">تطبيق</button>

    <div class="section-toggle" id="signalsSectionToggle">
      <button class="section-btn active" data-section="receivedSignalsSection">قائمة الإشارات</button>
      <button class="section-btn" data-section="mySignalsSection">إشاراتي السابقة</button>
    </div>

    <div id="receivedSignalsSection" class="section-content active">
      <div class="card">
        <h2 class="card-title">قائمة الإشارات</h2>
        <div class="view-controls">
          <div class="view-toggle">
            <button type="button" class="toggle-btn signals-view-toggle active" data-target="received"
              data-view-mode="card">🗂️ عرض البطاقات</button>
            <button type="button" class="toggle-btn signals-view-toggle" data-target="received"
              data-view-mode="table">📋 عرض الجدول</button>
          </div>
          <div class="rows-per-page" id="receivedRowsPerPage" style="display:none;">
            <label>عدد الصفوف:</label>
            <select id="receivedRowsSelect">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="50">50</option>
              <option value="all">الكل</option>
            </select>
          </div>
        </div>
        <div id="signalsList" class="signals-grid"></div>

    </div>

    <div id="mySignalsSection" class="section-content">
      <div class="card">
        <h2 class="card-title">إشاراتي السابقة</h2>
        <div class="view-controls">
          <div class="view-toggle">
            <button type="button" class="toggle-btn signals-view-toggle active" data-target="mine"
              data-view-mode="card">🗂️ عرض البطاقات</button>
            <button type="button" class="toggle-btn signals-view-toggle" data-target="mine" data-view-mode="table">📋
              عرض الجدول</button>
          </div>
          <div class="rows-per-page" id="mineRowsPerPage" style="display:none;">
            <label>عدد الصفوف:</label>
            <select id="mineRowsSelect">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="50">50</option>
              <option value="all">الكل</option>
            </select>
          </div>
        </div>
        <div id="mySignalsList" class="signals-grid"></div>
      </div>
    </div>
  </div>

  <!-- Localisations Modal -->
  <div id="locModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="locModalTitle">

  <!-- Add Signalisation Modal -->
  <div id="addSignalModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="addSignalTitle">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="addSignalTitle">➕ إضافة إشارة جديدة</div>
        <button class="modal-close" id="closeAddSignalBtn">إغلاق</button>
      </div>
      <div class="modal-body">
        <div class="filters" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;">
          <div class="form-group">
            <label class="form-label">نوع الإشارة</label>
            <select id="addTypeId"></select>
          </div>
          <div class="form-group">
            <label class="form-label">العنوان</label>
            <input id="addTitle" type="text" placeholder="عنوان مختصر" />
          </div>
          <div class="form-group" style="grid-column: 1 / -1;">
            <label class="form-label">الوصف</label>
            <input id="addDesc" type="text" placeholder="وصف مختصر (اختياري)" />
          </div>
          <div class="form-group">
            <label class="form-label">الموقع (نص حر)</label>
            <input id="addLocationText" type="text" placeholder="مثال: مبنى A، طابق 1، أمام القاعة 101" />
          </div>
          <div class="form-group">
            <label class="form-label">المبنى</label>
            <select id="addLocBatiment"></select>
          </div>
          <div class="form-group">
            <label class="form-label">الطابق</label>
            <select id="addLocEtage"></select>
          </div>
          <div class="form-group">
            <label class="form-label">القاعة/المكان</label>
            <select id="addLocSalle"></select>
          </div>

            <label class="form-label">صورة (اختياري)</label>
            <input id="addPhoto" type="file" accept="image/*" />
          </div>
          <div class="form-group" style="display:flex;align-items:flex-end;grid-column:1/-1">
            <button class="btn btn-primary" id="submitAddSignalBtn">حفظ الإشارة</button>

      </div>
    </div>
  </div>

  <!-- Types → Responsibles Overview Modal -->
  <div id="typeRespModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="typeRespTitle">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="typeRespTitle">👥 مسؤولو الأنواع</div>
        <button class="modal-close" id="closeTypeRespBtn">إغلاق</button>
      </div>
      <div class="modal-body">
        <div id="typeRespBody"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const API = 'http://localhost:3020/api/signals';
    const CORE_API = 'http://localhost:3020';
    let responsibleId = '';
    let cachedTypes = [];
    let locModalEl, locModalBodyEl;
    let addSignalModalEl;
    let cachedAddLocs = [];
    let typeRespModalEl, typeRespBodyEl;
    let cachedEmployees = [];
    const VIEW_MODES = { CARD: 'card', TABLE: 'table' };
    const SORT_DIR = { ASC: 'asc', DESC: 'desc' };
    const DEFAULT_SORT = { field: 'created_at', dir: SORT_DIR.DESC };
    let receivedViewMode = localStorage.getItem('signalsRespReceivedViewMode') || VIEW_MODES.CARD;
    let mySignalsViewMode = localStorage.getItem('signalsRespMyViewMode') || VIEW_MODES.CARD;
    if (!Object.values(VIEW_MODES).includes(receivedViewMode)) receivedViewMode = VIEW_MODES.CARD;
    if (!Object.values(VIEW_MODES).includes(mySignalsViewMode)) mySignalsViewMode = VIEW_MODES.CARD;

    function getRowsPerPage(key, defaultValue = 10) {
      const stored = localStorage.getItem(key);
      if (!stored) return defaultValue;
      if (stored === 'all' || stored === 'Infinity') return Infinity;
      const parsed = parseInt(stored, 10);
      return isNaN(parsed) ? defaultValue : parsed;
    }

    let receivedRowsPerPage = getRowsPerPage('signalsRespReceivedRowsPerPage', 10);
    let mySignalsRowsPerPage = getRowsPerPage('signalsRespMyRowsPerPage', 10);
    let receivedCurrentPage = parseInt(localStorage.getItem('signalsRespReceivedCurrentPage') || '1', 10);
    let mySignalsCurrentPage = parseInt(localStorage.getItem('signalsRespMyCurrentPage') || '1', 10);

    function readSort(key) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || '{}');
        if (parsed.field && parsed.dir) return { ...DEFAULT_SORT, ...parsed };
      } catch (_) { /* ignore */ }
      return { ...DEFAULT_SORT };
    }

    let receivedSort = readSort('signalsRespReceivedSort');
    let mySignalsSort = readSort('signalsRespMySort');
    let receivedSignalsCache = [];

    // ---- Auth helpers (kept from existing implementation) ----
    function getAuthHeaders() {
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('token') || params.get('access_token');
      const tokenFromAuth = (typeof authManager !== 'undefined' && authManager.getToken) ? authManager.getToken() : null;
      const storedToken = localStorage.getItem('token') || sessionStorage.getItem('token');
      const token = urlToken || tokenFromAuth || storedToken;
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    function isUuidLike(v) {
      return typeof v === 'string' && /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$/.test(v);
    }

    async function resolveResponsibleId() {
      const params = new URLSearchParams(window.location.search);
      const urlId = params.get('responsibleId') || params.get('responsible_id') || params.get('id');
      const user = (typeof authManager !== 'undefined' && authManager.getUser) ? authManager.getUser() : null;
      const storedId = localStorage.getItem('signals.responsibleId');

      // Priority: auth employee_id -> stored -> url param (for embedded)
      let candidate = user?.employee_id || storedId || urlId;
      if (candidate && isUuidLike(candidate)) return candidate;

      const userId = user?.id || user?.user_id;
      if (!userId) return urlId && isUuidLike(urlId) ? urlId : null;

      try {
        const res = await fetch(`${CORE_API}/employees/by-user/${userId}`, { headers: getAuthHeaders() });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          const empId = data?.employee?.id || data?.id;
          if (empId) {
            localStorage.setItem('signals.responsibleId', empId);
            return empId;
          }
        }
      } catch (_) { /* ignore */ }

      return urlId && isUuidLike(urlId) ? urlId : null;
    }

    function showAlert(msg, isError = false) {
      const alert = $('alert');
      if (!alert) return;
      alert.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
      alert.textContent = msg;
      alert.style.display = 'block';
      setTimeout(() => alert.style.display = 'none', 4000);
    }

    async function fetchAPI(url, options = {}) {
      const headers = {
        ...(options.headers || {}),
        ...getAuthHeaders(),
        'Content-Type': (options.body && !(options.body instanceof FormData)) ? 'application/json' : undefined
      };
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const data = await res.json().catch(() => ({ error: 'خطأ في الخادم' }));
        throw new Error(data.error || 'خطأ في الخادم');
      }
      return res.json();
    }

    async function loadTypes() {
      try {
        const types = await fetchAPI(`${API}/types`);
        cachedTypes = types;
        const select = $('typeId');
        if (!select) return;
        select.innerHTML = '<option value="">جميع الأنواع</option>' +
          types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
      } catch (e) {
        showAlert(e.message, true);
      }
    }

    async function loadManageTypes() {
      try {
        const types = await fetchAPI(`${API}/maintenance/${responsibleId}/types-with-responsibles`);
        const select = $('manageTypeId');
        if (!select) return;
        select.innerHTML = types.map(t => `<option value="${t.id}">${t.name} (${t.responsibles_count} مسؤول)</option>`).join('');
        await loadManageResponsibles();
      } catch (e) { showAlert(e.message, true); }
    }

    async function loadManageEmployees() {
      try {
        const employees = await fetchAPI(`${API}/maintenance/${responsibleId}/employees`);
        cachedEmployees = employees;
        const select = $('manageEmployeeId');
        if (select) {
          select.innerHTML = employees.length ? employees.map(e => `<option value="${e.id}">${e.first_name} ${e.last_name}</option>`).join('') : '<option>لا يوجد موظفين</option>';
        }
        populateNewTypeEmployees();
      } catch (e) { showAlert(e.message, true); }
    }

    async function loadManageResponsibles() {
      const typeSelect = $('manageTypeId');
      if (!typeSelect) return;
      const typeId = typeSelect.value;
      if (!typeId) return;
      try {
        const responsibles = await fetchAPI(`${API}/maintenance/${responsibleId}/types/${typeId}/responsibles`);
        const list = $('responsiblesList');
        if (!list) return;
        if (!responsibles.length) {
          list.innerHTML = '<li style="padding:12px;background:#f8fafc;border-radius:10px;color:#64748b">لا يوجد مسؤولون لهذا النوع</li>';
          return;
        }
        list.innerHTML = responsibles.map(r => `
          <li style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#f8fafc;border-radius:10px">
            <span>${r.first_name} ${r.last_name}</span>
          </li>
        `).join('');
      } catch (e) { showAlert(e.message, true); }
    }

    async function loadSignals() {
      if (!responsibleId) return;

      // Reset to first page when filters change
      receivedCurrentPage = 1;
      localStorage.setItem('signalsRespReceivedCurrentPage', '1');

      const params = new URLSearchParams();
      if ($('typeId').value) params.set('typeId', $('typeId').value);
      if ($('status').value) params.set('status', $('status').value);
      if ($('from').value) params.set('from', $('from').value);
      if ($('to').value) params.set('to', $('to').value);
      if ($('q').value.trim()) params.set('q', $('q').value.trim());

      try {
        const data = await fetchAPI(`${API}/responsible/${responsibleId}/signalisations?${params}`);
        receivedSignalsCache = data.data || [];
        updateStats(data.stats || { total: 0, pending: 0, treated: 0 });
        renderReceivedSignalsView();
        // Auto-mark viewed for all items (no click needed)
        autoMarkViewed(receivedSignalsCache);
      } catch (e) {
        showAlert(e.message, true);
      }
    }

    function updateStats(stats) {
      $('statTotal').textContent = stats.total || 0;
      $('statPending').textContent = stats.pending || 0;
      $('statTreated').textContent = stats.treated || 0;
    }

    async function autoMarkViewed(signals) {
      const idsToView = (signals || []).filter(s => !s.is_treated)
        .map(s => s.id);
      if (!idsToView.length) return;
      try {
        await Promise.all(idsToView.map(id => fetchAPI(`${API}/responsible/${responsibleId}/signalisations/${id}/mark-viewed`, { method: 'POST' })));
      } catch (_) { /* silent */ }
    }

    function renderReceivedSignalCard(s) {
      const date = new Date(s.created_at).toLocaleDateString('ar-DZ', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const statusClass = s.is_treated ? 'treated' : 'pending';
      return `
          <div class="signal-card ${statusClass}">
            <div class="signal-header">
              <span class="signal-type">${s.type_name || ''}</span>
              <span class="signal-status ${s.is_treated ? 'status-treated' : 'status-pending'}">
                ${s.is_treated ? '✅ تمت المعالجة' : '⏳ قيد المعالجة'}
              </span>
            </div>
            <div class="signal-employee">👤 من: ${s.employee_name || ''}</div>
            <h3 class="signal-title">${s.title || ''}</h3>
            ${s.description ? `<p class="signal-desc">${s.description}</p>` : ''}
            ${s.location ? `<div class="signal-location">📍 ${s.location}</div>` : ''}
            <div class="signal-date">🕒 ${date}</div>
            ${s.photo_path ? `<button class="btn btn-secondary" style="margin-bottom:8px;padding:6px 12px;font-size:12px;" onclick="openSignalPhotoModal('${s.photo_path}')">📷 عرض الصورة</button>` : ''}
            <div class="signal-actions">
              <button class="btn btn-secondary" onclick="markViewed('${s.id}')">تم المشاهدة</button>
              ${!s.is_treated ? `<button class="btn btn-warning" onclick="markInProgress('${s.id}')">قيد المعالجة</button>` : ''}
              ${!s.is_treated ? `<button class="btn btn-success" onclick="markTreated('${s.id}')">تمت المعالجة</button>` : ''}
          </div>
          </div>
        `;
    }

    function formatSignalDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleDateString('ar-DZ', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function normalizeFieldValue(signal, field) {
      switch (field) {
        case 'type_name': return (signal.type_name || '').toLowerCase();
        case 'employee_name': return (signal.employee_name || '').toLowerCase();
        case 'title': return (signal.title || '').toLowerCase();
        case 'location': return (signal.location || '').toLowerCase();
        case 'status': return signal.is_treated ? 1 : 0;
        case 'created_at': return new Date(signal.created_at || 0).getTime();
        default: return '';
      }
    }

    function sortSignals(list, sortCfg = DEFAULT_SORT) {
      const { field, dir } = sortCfg || DEFAULT_SORT;
      if (!field) return [...list];
      const direction = dir === SORT_DIR.ASC ? 1 : -1;
      return [...list].sort((a, b) => {
        const av = normalizeFieldValue(a, field);
        const bv = normalizeFieldValue(b, field);
        if (av === bv) return 0;
        return av > bv ? direction : -direction;
      });
    }

    function getSortIndicator(target, field) {
      const sort = target === 'received' ? receivedSort : mySignalsSort;
      if (sort.field !== field) return '↕';
      return sort.dir === SORT_DIR.ASC ? '↑' : '↓';
    }

    function buildSortHeader(target, field, label) {
      return `<button type="button" class="sort-btn" data-target="${target}" data-sort="${field}">${label} <span class="sort-indicator">${getSortIndicator(target, field)}</span></button>`;
    }

    function syncViewToggle(target, mode) {

    function renderPagination(target, total, currentPage, rowsPerPage) {
      if (rowsPerPage === Infinity || rowsPerPage === 'all') return '';
      const totalPages = Math.ceil(total / rowsPerPage);
      if (totalPages <= 1) return '';

      const start = (currentPage - 1) * rowsPerPage + 1;
      const end = Math.min(currentPage * rowsPerPage, total);

      let paginationHTML = '<div class="pagination">';

      // Previous button
      paginationHTML += `<button class="pagination-btn" data-target="${target}" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>← السابق</button>`;

      // Page numbers
      const maxVisiblePages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

      if (endPage - startPage < maxVisiblePages - 1) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
      }

      if (startPage > 1) {
        paginationHTML += `<button class="pagination-btn page-number" data-target="${target}" data-page="1">1</button>`;
        if (startPage > 2) {
          paginationHTML += `<span class="pagination-btn" style="border:none;background:transparent;cursor:default;">...</span>`;
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        paginationHTML += `<button class="pagination-btn page-number ${i === currentPage ? 'active' : ''}" data-target="${target}" data-page="${i}">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          paginationHTML += `<span class="pagination-btn" style="border:none;background:transparent;cursor:default;">...</span>`;
        }
        paginationHTML += `<button class="pagination-btn page-number" data-target="${target}" data-page="${totalPages}">${totalPages}</button>`;
      }

      // Next button
      paginationHTML += `<button class="pagination-btn" data-target="${target}" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>التالي →</button>`;

      paginationHTML += `<span class="pagination-info">عرض ${start}-${end} من ${total}</span>`;
      paginationHTML += '</div>';

      return paginationHTML;
    }

    function paginateData(data, page, rowsPerPage) {
      if (rowsPerPage === Infinity || rowsPerPage === 'all') {
        return { data: data, totalPages: 1, currentPage: 1 };
      }
      const totalPages = Math.ceil(data.length / rowsPerPage);
      // Ensure page is within valid range
      const validPage = Math.max(1, Math.min(page, totalPages || 1));
      const start = (validPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      return {
        data: data.slice(start, end),
        totalPages: totalPages,
        currentPage: validPage
      };
    }

    function updateSort(target, field) {
      if (target !== 'received' && target !== 'mine') return;
      const current = target === 'received' ? receivedSort : mySignalsSort;
      if (!field) return;
      const nextDir = current.field === field && current.dir === SORT_DIR.ASC ? SORT_DIR.DESC : SORT_DIR.ASC;
      const next = { field, dir: nextDir };
      if (target === 'received') {
        receivedSort = next;
        localStorage.setItem('signalsRespReceivedSort', JSON.stringify(next));
        renderReceivedSignalsView();
      } else {
        mySignalsSort = next;
        localStorage.setItem('signalsRespMySort', JSON.stringify(next));
        renderMySignals(mySignalsCache);
      }
    }

    function groupBy(arr, keyFn) {
      const map = new Map();
      for (const item of arr) {
        const key = keyFn(item) || '';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      }
      return map;
    }

    async function submitAddSignal() {
      const btn = $('submitAddSignalBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loading"></span>'; }
      const typeId = $('addTypeId').value;
      const title = $('addTitle').value.trim();
      const description = $('addDesc').value.trim();
      const locationText = $('addLocationText').value.trim();
      const locInputEl = $('addLocalisationId');
      const localisationId = locInputEl ? locInputEl.value.trim() : '';
      const photoInput = $('addPhoto');
      if (!typeId || !title) {
        showAlert('⚠️ النوع والعنوان إجباريان', true);
        if (btn) { btn.disabled = false; btn.textContent = 'حفظ الإشارة'; }
        return;
      }
      try {
        if (editingMySignalId) {
          await fetchAPI(`${API}/employee/${responsibleId}/signalisations/${editingMySignalId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ typeId, title, description })
          });
          showAlert('✅ تم تحديث الإشارة بنجاح');
        } else {
          const fd = new FormData();
          fd.append('typeId', typeId);
          fd.append('title', title);
          if (description) fd.append('description', description);
          if (localisationId) {
            fd.append('localisation_id', localisationId);
          } else if (locationText) {
            fd.append('location', locationText);
          }
          const selRoom = $('addLocSalle').value;
          if (selRoom) {
            fd.set('localisation_id', selRoom);
            fd.delete('location');
          }
          if (photoInput && photoInput.files && photoInput.files[0]) {
            fd.append('photo', photoInput.files[0]);
          }
          const res = await fetch(`${API}/employee/${responsibleId}/signalisations`, {
            method: 'POST',
            body: fd
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ error: 'خطأ في الخادم' }));
            throw new Error(err.error || 'خطأ في الخادم');
          }
          await res.json();
          showAlert('✅ تم إضافة الإشارة بنجاح');
        }
        closeAddSignalModal();
        await loadSignals();
        await loadMySignals();
      } catch (e) {
        showAlert(e.message, true);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'حفظ الإشارة'; }
      }
    }

      list.dataset.viewMode = mySignalsViewMode;
      const rowsPerPageEl = $('mineRowsPerPage');
      if (rowsPerPageEl) {
        rowsPerPageEl.style.display = 'flex';
      }
      if (!signals || !signals.length) {
        list.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
            <p>لا توجد إشارات سابقة</p>
          </div>
        `;
        const paginationEl = document.getElementById('minePagination');
        if (paginationEl) paginationEl.remove();
        return;
      }
      const sorted = sortSignals(signals, mySignalsSort);
      const total = sorted.length;
      const paginated = paginateData(sorted, mySignalsCurrentPage, mySignalsRowsPerPage);
      const displayed = paginated.data;

      if (mySignalsViewMode === VIEW_MODES.TABLE) {
        list.innerHTML = renderMySignalsTable(sorted);
        const paginationHTML = renderPagination('mine', total, mySignalsCurrentPage, mySignalsRowsPerPage);
        if (paginationHTML) {
          let paginationContainer = document.getElementById('minePagination');
          if (!paginationContainer) {
            paginationContainer = document.createElement('div');
            paginationContainer.id = 'minePagination';
            list.parentElement.appendChild(paginationContainer);
          }
          paginationContainer.innerHTML = paginationHTML;
        } else {
          const paginationContainer = document.getElementById('minePagination');
          if (paginationContainer) paginationContainer.remove();
        }
      } else {
        list.innerHTML = displayed.map(s => {
          const date = new Date(s.created_at).toLocaleDateString('ar-DZ', {
            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const statusClass = s.is_treated ? 'treated' : 'pending';
          return `
          <div class="signal-card ${statusClass}">
            <div class="signal-header">
              <span class="signal-type">${s.type_name || ''}</span>
              <span class="signal-status ${s.is_treated ? 'status-treated' : 'status-pending'}">
                ${s.is_treated ? '✅ تمت المعالجة' : '⏳ قيد المعالجة'}
              </span>
            </div>
            <h3 class="signal-title">${s.title || ''}</h3>
            ${s.description ? `<p class="signal-desc">${s.description}</p>` : ''}
            ${s.location ? `<div class="signal-location">📍 ${s.location}</div>` : ''}
            <div class="signal-date">🕒 ${date}</div>
            ${s.photo_path ? `<button class="btn btn-secondary" style="margin-top:8px;padding:6px 12px;font-size:12px;" onclick="openSignalPhotoModal('${s.photo_path}')">📷 عرض الصورة</button>` : ''}
            ${!s.is_treated ? `
              <div style="display:flex;gap:8px;margin-top:10px;">
                <button class="btn btn-secondary" style="flex:1;padding:8px 12px;font-size:12px;" onclick="openEditMySignalModal('${s.id}')">✏️ تعديل</button>
                <button class="btn btn-secondary" style="flex:1;padding:8px 12px;font-size:12px;background:#ef4444;" onclick="deleteMySignal('${s.id}')">🗑 حذف</button>
              </div>
            ` : ''}
          </div>
        `;
        }).join('');
        const paginationHTML = renderPagination('mine', total, mySignalsCurrentPage, mySignalsRowsPerPage);
        if (paginationHTML) {
          let paginationContainer = document.getElementById('minePagination');
          if (!paginationContainer) {
            paginationContainer = document.createElement('div');
            paginationContainer.id = 'minePagination';
            list.parentElement.appendChild(paginationContainer);
          }
          paginationContainer.innerHTML = paginationHTML;
        } else {
          const paginationContainer = document.getElementById('minePagination');
          if (paginationContainer) paginationContainer.remove();
        }
      }
    }

    function openEditMySignalModal(id) {
      const sig = mySignalsCache.find(s => String(s.id) === String(id));
      if (!sig) return;
      editingMySignalId = id;
      const typeSelect = $('addTypeId');
      if (typeSelect && sig.type_id) {
        typeSelect.value = sig.type_id;
      }
      $('addTitle').value = sig.title || '';
      $('addDesc').value = sig.description || '';
      $('addLocationText').value = sig.location || '';
      const btn = $('submitAddSignalBtn');
      if (btn) btn.textContent = 'تحديث الإشارة';
      addSignalModalEl.classList.add('open');
    }

    async function deleteMySignal(id) {
      if (!confirm('هل تريد حذف هذه الإشارة؟')) return;
      try {
        await fetchAPI(`${API}/employee/${responsibleId}/signalisations/${id}`, { method: 'DELETE' });
        showAlert('✅ تم حذف الإشارة بنجاح');
        await loadSignals();
        await loadMySignals();
      } catch (e) {
        showAlert(e.message, true);
      }
    }

    document.addEventListener('change', (e) => {
      if (e.target && e.target.id === 'manageTypeId') loadManageResponsibles();
      if (e.target && e.target.id === 'receivedRowsSelect') {
        const value = e.target.value;
        receivedRowsPerPage = value === 'all' ? Infinity : parseInt(value, 10);
        receivedCurrentPage = 1;
        localStorage.setItem('signalsRespReceivedRowsPerPage', String(receivedRowsPerPage));
        localStorage.setItem('signalsRespReceivedCurrentPage', '1');
        renderReceivedSignalsView();
      }
      if (e.target && e.target.id === 'mineRowsSelect') {
        const value = e.target.value;
        mySignalsRowsPerPage = value === 'all' ? Infinity : parseInt(value, 10);
        mySignalsCurrentPage = 1;
        localStorage.setItem('signalsRespMyRowsPerPage', String(mySignalsRowsPerPage));
        localStorage.setItem('signalsRespMyCurrentPage', '1');
        renderMySignals(mySignalsCache);
      }
    });

    $('applyBtn').addEventListener('click', loadSignals);

    // Auto-apply filters when changed
    ['typeId', 'status', 'from', 'to'].forEach(id => {
      const el = $(id);
      if (el) {
        el.addEventListener('change', () => {
          if (responsibleId) loadSignals();
        });
      }
    });

    // Auto-apply search with debounce
    let searchTimeout;
    const searchInput = $('q');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          if (responsibleId) loadSignals();
        }, 500);
      });
    }

    document.addEventListener('click', (e) => {
      // pagination
      let paginationBtn = e.target;
      if (!paginationBtn.classList || !paginationBtn.classList.contains('pagination-btn')) {
        paginationBtn = e.target.closest && e.target.closest('.pagination-btn');
      }
      if (paginationBtn && paginationBtn.tagName === 'BUTTON' && !paginationBtn.disabled) {
        const target = paginationBtn.getAttribute('data-target');
        const pageStr = paginationBtn.getAttribute('data-page');
        if (target && pageStr) {
          const page = parseInt(pageStr, 10);
          if (target === 'received' && !isNaN(page) && page > 0) {
            e.preventDefault();
            e.stopPropagation();
            receivedCurrentPage = page;
            localStorage.setItem('signalsRespReceivedCurrentPage', String(page));
            renderReceivedSignalsView();
            return;
          } else if (target === 'mine' && !isNaN(page) && page > 0) {
            e.preventDefault();
            e.stopPropagation();
            mySignalsCurrentPage = page;
            localStorage.setItem('signalsRespMyCurrentPage', String(page));
            renderMySignals(mySignalsCache);
            return;
          }
        }
      }

      if (e.target && e.target.id === 'assignBtn') assignResponsible();
      if (e.target && e.target.id === 'addLocalisationBtn') addLocalisation();
      if (e.target && e.target.id === 'reloadLocsBtn') loadLocalisationDistincts();
      if (e.target && e.target.id === 'viewLocalisationsBtn') loadAllLocalisations();
      // Use relative URLs (kept from previous version) to support deployment behind prefixes
      if (e.target && e.target.id === 'viewStatisticsBtn') window.location.href = `signals_statistique.html?responsibleId=${responsibleId}`;
      if (e.target && e.target.id === 'parametresBtn') window.location.href = `parametres.html?responsibleId=${responsibleId}`;
      if (e.target && e.target.id === 'closeLocModalBtn') closeLocModal();
      if (e.target && e.target.id === 'locModal') closeLocModal();
      if (e.target && e.target.id === 'openAddSignalBtn') openAddSignalModal();
      if (e.target && e.target.id === 'closeAddSignalBtn') closeAddSignalModal();
      if (e.target && e.target.id === 'addSignalModal') closeAddSignalModal();
      if (e.target && e.target.id === 'submitAddSignalBtn') { e.preventDefault(); submitAddSignal(); }
      if (e.target && e.target.id === 'viewTypeResponsiblesBtn') loadTypeResponsiblesOverview();
      if (e.target && e.target.id === 'closeTypeRespBtn') closeTypeRespModal();
      if (e.target && e.target.id === 'typeRespModal') closeTypeRespModal();
      if (e.target && e.target.id === 'addTypeBtn') addSignalType();

      const viewBtn = e.target.closest && e.target.closest('.signals-view-toggle');
      if (viewBtn) {
        const target = viewBtn.dataset.target;
        const mode = viewBtn.dataset.viewMode;
        if (!Object.values(VIEW_MODES).includes(mode)) return;
        if (target === 'received') {
          receivedViewMode = mode;
          localStorage.setItem('signalsRespReceivedViewMode', mode);
          syncViewToggle('received', mode);
          renderReceivedSignalsView();
        } else if (target === 'mine') {
          mySignalsViewMode = mode;
          localStorage.setItem('signalsRespMyViewMode', mode);
          syncViewToggle('mine', mode);
          renderMySignals(mySignalsCache);
        }
      }

      const sortBtn = e.target.closest && e.target.closest('.sort-btn');
      if (sortBtn) {
        const target = sortBtn.dataset.target;
        const field = sortBtn.dataset.sort;
        updateSort(target, field);
      }
    });

    window.openEditMySignalModal = openEditMySignalModal;
    window.deleteMySignal = deleteMySignal;

    (async function init() {
      responsibleId = await resolveResponsibleId();
      if (!responsibleId) {
        showAlert('⚠️ معرف المسؤول مفقود', true);
        return;
      }
      localStorage.setItem('signals.responsibleId', responsibleId);
      await loadTypes();
      await loadSignals();
      await loadMySignals();
      await loadManageTypes();
      await loadManageEmployees();
      await loadLocalisationDistincts();
      locModalEl = $('locModal');
      locModalBodyEl = $('locModalBody');
      addSignalModalEl = $('addSignalModal');
      typeRespModalEl = $('typeRespModal');
      typeRespBodyEl = $('typeRespBody');
      const submitBtn = $('submitAddSignalBtn');
      if (submitBtn) submitBtn.addEventListener('click', (e) => { e.preventDefault(); submitAddSignal(); });
      const b = $('addLocBatiment'); const e = $('addLocEtage');
      if (b) b.addEventListener('change', () => { populateAddEtages(); populateAddSalles(); });
      if (e) e.addEventListener('change', populateAddSalles);

      const sectionToggle = document.getElementById('signalsSectionToggle');
      const receivedSection = document.getElementById('receivedSignalsSection');
      const mySection = document.getElementById('mySignalsSection');
      let activeSection = localStorage.getItem('signalsRespActiveSection') || 'receivedSignalsSection';

      function setSection(section, { skipStorage } = {}) {
        if (section !== 'receivedSignalsSection' && section !== 'mySignalsSection') {
          section = 'receivedSignalsSection';
        }
        activeSection = section;
        if (!skipStorage) {
          localStorage.setItem('signalsRespActiveSection', section);
        }
        if (receivedSection) receivedSection.classList.toggle('active', section === 'receivedSignalsSection');
        if (mySection) mySection.classList.toggle('active', section === 'mySignalsSection');
        if (sectionToggle) {
          sectionToggle.querySelectorAll('.section-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.section === section);
          });
        }
      }

      if (sectionToggle) {
        sectionToggle.querySelectorAll('.section-btn').forEach(btn => {
          btn.addEventListener('click', () => setSection(btn.dataset.section));
        });
      }
      syncViewToggle('received', receivedViewMode);
      syncViewToggle('mine', mySignalsViewMode);
      setSection(activeSection, { skipStorage: true });

      const receivedRowsSelect = $('receivedRowsSelect');
      if (receivedRowsSelect) {
        receivedRowsSelect.value = receivedRowsPerPage === Infinity ? 'all' : String(receivedRowsPerPage);
      }
      const mineRowsSelect = $('mineRowsSelect');
      if (mineRowsSelect) {
        mineRowsSelect.value = mySignalsRowsPerPage === Infinity ? 'all' : String(mySignalsRowsPerPage);
      }
    })();
  </script>

  <script>
    function openSignalPhotoModal(path) {
      let modal = document.getElementById('signalPhotoModal');
      let img = document.getElementById('signalPhotoPreview');
      if (!modal) {
        // create modal lazily if missing
        modal = document.createElement('div');
        modal.id = 'signalPhotoModal';
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.65);display:flex;align-items:center;justify-content:center;z-index:1600;padding:1rem;';
        modal.innerHTML = `
          <div style="background:white;border-radius:12px;max-width:90vw;max-height:90vh;padding:1rem;box-shadow:0 10px 25px rgba(0,0,0,0.25);position:relative;">
            <button type="button" style="position:absolute;top:0.25rem;left:0.5rem;border:none;background:transparent;font-size:1.5rem;cursor:pointer;color:#1f2937;" onclick="closeSignalPhotoModal()">✕</button>
            <img id="signalPhotoPreview" src="" alt="صورة الإشارة" style="max-width:80vw;max-height:80vh;border-radius:8px;object-fit:contain;display:block;" />
          </div>
        `;
        modal.addEventListener('click', (e) => {
          if (e.target === modal) closeSignalPhotoModal();
        });
        document.body.appendChild(modal);
        img = document.getElementById('signalPhotoPreview');
      }
      if (!img || !path) return;
      img.src = path;
      modal.style.display = 'flex';
    }

    function closeSignalPhotoModal() {
      const modal = document.getElementById('signalPhotoModal');
      const img = document.getElementById('signalPhotoPreview');
      if (img) img.src = '';
      if (modal) modal.style.display = 'none';
    }

    window.openSignalPhotoModal = openSignalPhotoModal;
    window.closeSignalPhotoModal = closeSignalPhotoModal;
  </script>

<script>
// Language sync from parent frame
window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'languageChanged') {
        var lang = event.data.language || event.data.lang;
        if (!lang) return;
        if (typeof window.setLanguage === 'function') {
            window.setLanguage(lang);
        } else {
            localStorage.setItem('language', lang);
            localStorage.setItem('lang', lang);
            if (typeof window.updatePageTranslations === 'function') {
                window.updatePageTranslations();
            }
        }
    }
});
</script>
