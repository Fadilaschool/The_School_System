resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml;

    location ~* .(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/users/ {
        rewrite ^/api/users/(.*)$ /$1 break;
        set $users_upstream http://user-management-service:3002;
        proxy_pass $users_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/departments {
        rewrite ^/api/departments/(.+)$ /$1 break;
        rewrite ^/api/departments/?$ /departments break;
        set $dept_upstream http://department-service:3003;
        proxy_pass $dept_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/attendance/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/punches/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/exceptions/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/substitutions/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/salary/ {
        rewrite ^/api/salary/(.*)$ /$1 break;
        set $salary_upstream http://salary-service:3010;
        proxy_pass $salary_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/rapportemp/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/director/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/signals/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/complaints/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/reports/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/meetings/ {
        rewrite ^/api/meetings/(.*)$ /$1 break;
        set $meetings_upstream http://meeting-service:3005;
        proxy_pass $meetings_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/payments/ {
        rewrite ^/api/payments/(.*)$ /$1 break;
        set $payments_upstream http://payment-service:3006;
        proxy_pass $payments_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/notifications/ {
        rewrite ^/api/notifications/(.*)$ /$1 break;
        set $notif_upstream http://notification-service:3007;
        proxy_pass $notif_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/requests/ {
        rewrite ^/api/requests/(.*)$ /$1 break;
        set $requests_upstream http://request-service:3009;
        proxy_pass $requests_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/timetable/ {
        rewrite ^/api/timetable/(.*)$ /$1 break;
        set $timetable_upstream http://timetable-service:3011;
        proxy_pass $timetable_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location = /attendance-master.html {
        set $att_upstream http://attendance-service:3000;
        proxy_pass $att_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /daily-attendance.html {
        set $att_upstream http://attendance-service:3000;
        proxy_pass $att_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}
