server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml;

    # ─── Static files with cache headers ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Auth service: /api/auth/login → auth-service:3001/auth/login ────────────
    location /api/auth/ {
        proxy_pass http://auth-service:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── User management: /api/users/employees → user-management-service:3002/employees ──
    location /api/users/ {
        proxy_pass http://user-management-service:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Department service ───────────────────────────────────────────────────────
    # /api/departments      → department-service:3003/departments
    # /api/departments/123  → department-service:3003/departments/123
    location = /api/departments {
        proxy_pass http://department-service:3003/departments;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/departments/ {
        proxy_pass http://department-service:3003/departments/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Attendance service (pass-through: service has /api/ prefixed routes) ────
    location /api/attendance/ {
        proxy_pass http://attendance-service:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/punches/ {
        proxy_pass http://attendance-service:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/exceptions/ {
        proxy_pass http://attendance-service:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/substitutions/ {
        proxy_pass http://attendance-service:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Salary service: /api/salary/salaries → salary-service:3010/salaries ─────
    location /api/salary/ {
        proxy_pass http://salary-service:3010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── HR Tasks static pages (iframe embeds from frontend) ────────────────────
    # Frontend pages load iframes from ../../hr_tasks/hr_tasks/public/XXX.html
    # which resolves to /hr_tasks/hr_tasks/public/XXX.html
    location /hr_tasks/hr_tasks/public/ {
        proxy_pass http://hr-tasks-service:3020/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── HR Tasks service (pass-through: service has /api/ prefixed routes) ──────
    location /api/rapportemp/ {
        proxy_pass http://hr-tasks-service:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/director/ {
        proxy_pass http://hr-tasks-service:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/signals/ {
        proxy_pass http://hr-tasks-service:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/complaints/ {
        proxy_pass http://hr-tasks-service:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/reports/ {
        proxy_pass http://hr-tasks-service:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Meeting service: /api/meetings/meetings → meeting-service:3005/meetings ──
    location /api/meetings/ {
        proxy_pass http://meeting-service:3005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Payment service: /api/payments/payments → payment-service:3006/payments ──
    location /api/payments/ {
        proxy_pass http://payment-service:3006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Notification service ─────────────────────────────────────────────────────
    location /api/notifications/ {
        proxy_pass http://notification-service:3007/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Request service: /api/requests/requests → request-service:3009/requests ──
    location /api/requests/ {
        proxy_pass http://request-service:3009/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Timetable service: /api/timetable/timetables → timetable-service:3011/timetables ──
    location /api/timetable/ {
        proxy_pass http://timetable-service:3011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Attendance HTML pages (for iframe embedding) ────────────────────────────
    location = /attendance-master.html {
        proxy_pass http://attendance-service:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /daily-attendance.html {
        proxy_pass http://attendance-service:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── SPA fallback (serves index.html for all unknown paths) ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Security headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}
