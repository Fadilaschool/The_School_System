resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml;

    # ─── Static files with cache headers ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── API Proxies to backend services ─────────────────────────────────────────
    location /api/auth/ {
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/users/ {
        set $users_upstream http://user-management-service:3002;
        proxy_pass $users_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/departments/ {
        set $dept_upstream http://department-service:3003;
        proxy_pass $dept_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/departments {
        set $dept2_upstream http://department-service:3003;
        proxy_pass $dept2_upstream/api/departments;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/attendance/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream/api/attendance/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/salary/ {
        set $salary_upstream http://salary-service:3010;
        proxy_pass $salary_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/tasks/ {
        set $tasks_upstream http://hr-tasks-service:3020;
        proxy_pass $tasks_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/rapportemp/ {
        set $rapport_upstream http://hr-tasks-service:3020;
        proxy_pass $rapport_upstream/api/rapportemp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/director/ {
        set $director_upstream http://hr-tasks-service:3020;
        proxy_pass $director_upstream/api/director/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/meetings/ {
        set $meetings_upstream http://meeting-service:3005;
        proxy_pass $meetings_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/payments/ {
        set $payments_upstream http://payment-service:3006;
        proxy_pass $payments_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/notifications/ {
        set $notif_upstream http://notification-service:3007;
        proxy_pass $notif_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/requests/ {
        set $requests_upstream http://request-service:3009;
        proxy_pass $requests_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/timetable/ {
        set $timetable_upstream http://timetable-service:3011;
        proxy_pass $timetable_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── SPA fallback (serves index.html for all unknown paths) ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Security headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}
