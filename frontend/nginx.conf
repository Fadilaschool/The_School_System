resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml;

    # ─── Static files with cache headers ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Auth service: /api/auth/xxx → auth-service:3001/auth/xxx ────────────────
    location /api/auth/ {
        set $auth_upstream http://auth-service:3001;
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── User management: /api/users/xxx → user-management-service:3002/xxx ──────
    location /api/users/ {
        set $users_upstream http://user-management-service:3002;
        rewrite ^/api/users/(.*)$ /$1 break;
        proxy_pass $users_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Department service: handles /api/departments and /api/departments/xxx ───
    location /api/departments {
        set $dept_upstream http://department-service:3003;
        rewrite ^/api/departments/(.+)$ /$1 break;
        rewrite ^/api/departments/?$ /departments break;
        proxy_pass $dept_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Attendance service: passes /api/attendance/xxx through (service has /api/ routes) ──
    location /api/attendance/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/punches/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/exceptions/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/substitutions/ {
        set $attendance_upstream http://attendance-service:3000;
        proxy_pass $attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Salary service: /api/salary/xxx → salary-service:3010/xxx ──────────────
    location /api/salary/ {
        set $salary_upstream http://salary-service:3010;
        rewrite ^/api/salary/(.*)$ /$1 break;
        proxy_pass $salary_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── HR Tasks service: passes /api/rapportemp, /api/director, etc. through ───
    location /api/rapportemp/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/director/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/signals/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/complaints/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/reports/ {
        set $hr_upstream http://hr-tasks-service:3020;
        proxy_pass $hr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Meeting service: /api/meetings/xxx → meeting-service:3005/xxx ──────────
    location /api/meetings/ {
        set $meetings_upstream http://meeting-service:3005;
        rewrite ^/api/meetings/(.*)$ /$1 break;
        proxy_pass $meetings_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Payment service: /api/payments/xxx → payment-service:3006/xxx ──────────
    location /api/payments/ {
        set $payments_upstream http://payment-service:3006;
        rewrite ^/api/payments/(.*)$ /$1 break;
        proxy_pass $payments_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Notification service: /api/notifications/xxx → notification-service:3007/xxx ──
    location /api/notifications/ {
        set $notif_upstream http://notification-service:3007;
        rewrite ^/api/notifications/(.*)$ /$1 break;
        proxy_pass $notif_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Request service: /api/requests/xxx → request-service:3009/xxx ──────────
    location /api/requests/ {
        set $requests_upstream http://request-service:3009;
        rewrite ^/api/requests/(.*)$ /$1 break;
        proxy_pass $requests_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Timetable service: /api/timetable/xxx → timetable-service:3011/xxx ─────
    location /api/timetable/ {
        set $timetable_upstream http://timetable-service:3011;
        rewrite ^/api/timetable/(.*)$ /$1 break;
        proxy_pass $timetable_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Attendance service HTML pages (for iframe embedding) ────────────────────
    location = /attendance-master.html {
        set $att_upstream http://attendance-service:3000;
        proxy_pass $att_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /daily-attendance.html {
        set $att_upstream http://attendance-service:3000;
        proxy_pass $att_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── SPA fallback (serves index.html for all unknown paths) ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Security headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}
