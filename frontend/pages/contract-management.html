<!DOCTYPE html>
<html lang="en" dir="ltr" id="contract-page-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="nav.contract_management">Contract Management - HR Operations Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
    <style>
        :root {
            --director-indigo: #4338ca;
            --director-blue: #2563eb;
            --director-purple: #7c3aed;
            --director-slate: #0f172a;
            --director-card-bg: #ffffff;
            --director-surface: #f8fafc;
        }

        body {
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--director-slate);
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.06), transparent 45%), #f5f7fb;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 0.75rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .director-panel {
            background: var(--director-card-bg);
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(15, 23, 42, 0.06);
            margin-bottom: 2rem;
        }

        .filter-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .contract-table {
            width: 100%;
            border-collapse: collapse;
        }

        .contract-table th {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 2px solid rgba(15, 23, 42, 0.1);
        }

        .contract-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
        }

        .contract-table tr:hover {
            background: rgba(59, 130, 246, 0.02);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .status-expired {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: #f8fafc;
            color: #1e293b;
            border: 1px solid rgba(15, 23, 42, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- The reusable navbar will be automatically inserted here -->
    
    <main class="min-h-screen rtl:mr-16 ltr:ml-16">
        <div class="w-full p-6">
            <!-- Page Header -->
            <div class="page-header m-6">
                <h1 class="page-title" data-translate="nav.contract_management">
                    <i class="fas fa-file-contract"></i>
                    Contract Management
                </h1>
                <p class="page-subtitle" data-translate="contract.description">Manage employee contracts, renewals, and history</p>
            </div>

            <!-- Filters and Actions -->
            <div class="director-panel mx-6">
                <div class="filter-section">
                    <input type="text" id="filterName" class="filter-input" data-translate-placeholder="contract.search_employee_name" placeholder="Search by employee name...">
                    <select id="filterBranch" class="filter-input" data-translate-title="contract.filter_branch" title="Branch">
                        <option value="" data-translate="contract.all_branches">All Branches</option>
                    </select>
                    <input type="number" id="filterYear" class="filter-input" data-translate-placeholder="contract.filter_year" placeholder="Filter by year..." min="2020" max="2100">
                    <select id="filterStatus" class="filter-input">
                        <option value="" data-translate="contract.all_status">All Status</option>
                        <option value="active" data-translate="contract.active">Active</option>
                        <option value="expired" data-translate="contract.expired">Expired</option>
                    </select>
                    <button class="btn btn-primary" onclick="applyFilters()">
                        <i class="fas fa-filter"></i> <span data-translate="contract.apply_filters">Apply Filters</span>
                    </button>
                    <button class="btn btn-secondary" onclick="clearFilters()">
                        <i class="fas fa-times"></i> <span data-translate="contract.clear">Clear</span>
                    </button>
                </div>

                <div class="flex gap-2 flex-wrap">
                    <button class="btn btn-primary" onclick="openBulkRenewalModal()">
                        <i class="fas fa-sync-alt"></i> <span data-translate="contract.bulk_renew">Bulk Renew Contracts</span>
                    </button>
                    <button class="btn btn-secondary" onclick="downloadContractTemplate()" data-translate-title="contract.download_template" title="Download template">
                        <i class="fas fa-file-download"></i> <span data-translate="contract.download_template">Download template</span>
                    </button>
                    <button class="btn btn-secondary" onclick="loadContracts()">
                        <i class="fas fa-sync"></i> <span data-translate="contract.refresh">Refresh</span>
                    </button>
                </div>
            </div>

            <!-- Contracts Table -->
            <div class="director-panel mx-6">
                <div id="contractsTableContainer">
                    <table class="contract-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                                <th data-translate="contract.contract_number">Contract #</th>
                                <th data-translate="contract.employee">Employee</th>
                                <th data-translate="contract.position">Position</th>
                                <th data-translate="contract.start_date">Start Date</th>
                                <th data-translate="contract.end_date">End Date</th>
                                <th data-translate="contract.duration">Duration</th>
                                <th data-translate="contract.salary">Salary</th>
                                <th data-translate="contract.status">Status</th>
                                <th data-translate="contract.actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="contractsTableBody">
                            <tr>
                                <td colspan="10" class="text-center py-8 text-gray-500" data-translate="contract.loading_contracts">Loading contracts...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Bulk Renewal Modal -->
    <div id="bulkRenewalModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4" data-translate="contract.bulk_renew">Bulk Renew Contracts</h2>
            <div class="form-group">
                <label class="form-label"><span data-translate="contract.selected_employees">Selected Employees</span>: <span id="selectedCount">0</span></label>
                <div id="selectedEmployeesList" class="max-h-40 overflow-y-auto border p-2 rounded"></div>
            </div>
            <div class="form-group">
                <label class="form-label" for="renewStartDate" data-translate="contract.new_start_date">New Start Date *</label>
                <input type="date" id="renewStartDate" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="renewEndDate" data-translate="contract.new_end_date_optional">New End Date (Optional)</label>
                <input type="date" id="renewEndDate" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label" for="renewSalary" data-translate="contract.contract_salary_monthly">Contract Salary (Monthly)</label>
                <input type="number" id="renewSalary" class="form-input" step="0.01" min="0">
            </div>
            <div class="form-group">
                <label class="form-label" for="renewProbation" data-translate="contract.probation_months">Probation Period (Months)</label>
                <input type="number" id="renewProbation" class="form-input" min="0" value="0">
            </div>
            <div class="form-group">
                <label class="form-label" for="renewPosition" data-translate="contract.position_optional">Position (Optional)</label>
                <select id="renewPosition" class="form-input">
                    <option value="" data-translate="contract.keep_current_position">Keep Current Position</option>
                </select>
            </div>
            <div class="flex gap-2 justify-end mt-4">
                <button class="btn btn-secondary" onclick="closeBulkRenewalModal()" data-translate="contract.cancel">Cancel</button>
                <button class="btn btn-primary" onclick="submitBulkRenewal()" data-translate="contract.renew_contracts">Renew Contracts</button>
            </div>
        </div>
    </div>

    <!-- Contract Details Modal -->
    <div id="contractDetailsModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4" data-translate="contract.contract_details">Contract Details</h2>
            <div id="contractDetailsContent"></div>
            <div class="flex gap-2 justify-end mt-4">
                <button class="btn btn-secondary" onclick="closeContractDetailsModal()" data-translate="contract.close">Close</button>
                <button class="btn btn-primary" onclick="generateContractDocument()" id="generateDocBtn">
                    <i class="fas fa-file-pdf"></i> <span data-translate="contract.generate_document">Generate Document</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Contract Modal -->
    <div id="editContractModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4" data-translate="contract.edit_contract">Edit Contract</h2>
            <form id="editContractForm">
                <input type="hidden" id="editContractId">
                <div class="form-group">
                    <label class="form-label" for="editStartDate" data-translate="contract.start_date_required">Start Date *</label>
                    <input type="date" id="editStartDate" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editEndDate" data-translate="contract.end_date_optional">End Date (Optional)</label>
                    <input type="date" id="editEndDate" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="editSalary" data-translate="contract.contract_salary_monthly">Contract Salary (Monthly)</label>
                    <input type="number" id="editSalary" class="form-input" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="editProbation" data-translate="contract.probation_months">Probation Period (Months)</label>
                    <input type="number" id="editProbation" class="form-input" min="0" value="0">
                </div>
                <div class="flex gap-2 justify-end mt-4">
                    <button type="button" class="btn btn-secondary" onclick="closeEditContractModal()" data-translate="contract.cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-translate="contract.save_changes">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/translations.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script>
        if (!requireAuth()) {
            // Redirect handled by requireAuth
        }

        let contracts = [];
        let selectedContracts = new Set();
        let currentContractId = null;
        let positions = [];
        let branches = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const lang = (typeof window !== 'undefined' && window.currentLanguage) ? window.currentLanguage : (localStorage.getItem('language') || 'en');
            const html = document.getElementById('contract-page-html') || document.documentElement;
            if (lang === 'ar') {
                html.setAttribute('dir', 'rtl');
                html.setAttribute('lang', 'ar');
            } else {
                html.setAttribute('dir', 'ltr');
                html.setAttribute('lang', lang === 'fr' ? 'fr' : 'en');
            }
            if (typeof updatePageTranslations === 'function') updatePageTranslations();

            await loadPositions();
            await loadBranches();
            await loadContracts();

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('renewStartDate').value = today;
        });

        document.addEventListener('languageChanged', () => {
            const lang = (typeof window !== 'undefined' && window.currentLanguage) ? window.currentLanguage : 'en';
            const html = document.getElementById('contract-page-html') || document.documentElement;
            if (lang === 'ar') { html.setAttribute('dir', 'rtl'); html.setAttribute('lang', 'ar'); }
            else { html.setAttribute('dir', 'ltr'); html.setAttribute('lang', lang === 'fr' ? 'fr' : 'en'); }
            if (typeof updatePageTranslations === 'function') updatePageTranslations();
            renderContracts();
        });

        async function loadBranches() {
            const select = document.getElementById('filterBranch');
            if (!select) return;
            const allText = typeof translate === 'function' ? translate('contract.all_branches') : 'All Branches';
            select.innerHTML = '<option value="">' + allText + '</option>';
            try {
                branches = await APIService.request('users', '/contracts/branches');
                const list = Array.isArray(branches) ? branches : [];
                list.forEach(b => {
                    const name = (b && (b.name || b.id)) ? String(b.name || b.id).trim() : '';
                    if (!name) return;
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                });
                if (list.length === 0) branches = [];
            } catch (e) {
                console.error('Error loading branches:', e);
                branches = [];
            }
        }

        function addBranchesFromContracts(contractList) {
            const select = document.getElementById('filterBranch');
            if (!select || !Array.isArray(contractList) || contractList.length === 0) return;
            const existing = new Set(Array.from(select.options).map(o => o.value).filter(Boolean));
            contractList.forEach(c => {
                const name = (c.branch_name || c.institution || '').toString().trim();
                if (name && !existing.has(name)) {
                    existing.add(name);
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    select.appendChild(opt);
                }
            });
        }

        async function loadPositions() {
            try {
                positions = await APIService.request('users', '/positions');
                const select = document.getElementById('renewPosition');
                positions.forEach(pos => {
                    const option = document.createElement('option');
                    option.value = pos.id;
                    option.textContent = pos.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading positions:', error);
            }
        }

        async function loadContracts() {
            try {
                const name = document.getElementById('filterName').value;
                const branch = document.getElementById('filterBranch') ? document.getElementById('filterBranch').value : '';
                const year = document.getElementById('filterYear').value;
                const status = document.getElementById('filterStatus').value;

                let url = '/contracts?';
                if (name) url += `employee_name=${encodeURIComponent(name)}&`;
                if (branch) url += `branch=${encodeURIComponent(branch)}&`;
                if (year) url += `year=${year}&`;
                if (status) url += `status=${status}&`;

                contracts = await APIService.request('users', url);
                addBranchesFromContracts(contracts);
                renderContracts();
            } catch (error) {
                console.error('Error loading contracts:', error);
                const tbody = document.getElementById('contractsTableBody');
                const errMsg = typeof translate === 'function' ? translate('contract.error_loading') : 'Error loading contracts';
                tbody.innerHTML = '<tr><td colspan="10" class="text-center py-8 text-red-500">' + errMsg + ': ' + (error.message || '') + '</td></tr>';
            }
        }

        function renderContracts() {
            const tbody = document.getElementById('contractsTableBody');
            const t = typeof translate === 'function' ? translate : (k) => k;
            if (contracts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center py-8 text-gray-500">' + (t('contract.no_contracts') || 'No contracts found') + '</td></tr>';
                return;
            }

            const openEnded = t('contract.open_ended') || 'Open-ended';
            const monthsLabel = t('contract.months') || 'months';
            const activeLabel = t('contract.active') || 'Active';
            const expiredLabel = t('contract.expired') || 'Expired';
            const viewTitle = t('contract.view') || 'View';
            const editTitle = t('contract.edit') || 'Edit';
            const historyTitle = t('contract.history') || 'History';
            const deleteTitle = t('contract.delete') || 'Delete';

            tbody.innerHTML = contracts.map(contract => {
                const employeeName = contract.foreign_name && contract.foreign_last_name
                    ? `${contract.foreign_name} ${contract.foreign_last_name}`
                    : `${contract.first_name} ${contract.last_name}`;
                const status = contract.is_active && (!contract.end_date || new Date(contract.end_date) >= new Date())
                    ? 'active' : 'expired';
                const statusClass = status === 'active' ? 'status-active' : 'status-expired';
                const statusText = status === 'active' ? activeLabel : expiredLabel;
                const isSelected = selectedContracts.has(contract.id);

                return `
                    <tr>
                        <td>
                            <input type="checkbox" ${isSelected ? 'checked' : ''}
                                   onchange="toggleContractSelection('${contract.id}')">
                        </td>
                        <td>${contract.contract_number || 'N/A'}</td>
                        <td>${employeeName}</td>
                        <td>${contract.position_name || 'N/A'}</td>
                        <td>${formatDate(contract.start_date)}</td>
                        <td>${contract.end_date ? formatDate(contract.end_date) : openEnded}</td>
                        <td>${contract.duration_months != null ? contract.duration_months + ' ' + monthsLabel : 'N/A'}</td>
                        <td>${contract.contract_salary ? formatCurrency(contract.contract_salary) : 'N/A'}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="flex gap-2">
                                <button class="btn btn-secondary" onclick="viewContract('${contract.id}')" title="${viewTitle}">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-secondary" onclick="editContract('${contract.id}')" title="${editTitle}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-secondary" onclick="viewContractHistory('${contract.employee_id}')" title="${historyTitle}">
                                    <i class="fas fa-history"></i>
                                </button>
                                <button class="btn btn-secondary" onclick="deleteContract('${contract.id}')" title="${deleteTitle}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-GB');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-DZ', { style: 'currency', currency: 'DZD' }).format(amount);
        }

        function toggleContractSelection(contractId) {
            if (selectedContracts.has(contractId)) {
                selectedContracts.delete(contractId);
            } else {
                selectedContracts.add(contractId);
            }
            updateSelectedCount();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            selectedContracts.clear();
            if (selectAll) {
                contracts.forEach(c => selectedContracts.add(c.id));
            }
            renderContracts();
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedContracts.size;
            const selectedList = document.getElementById('selectedEmployeesList');
            const noSel = typeof translate === 'function' ? translate('contract.no_employees_selected') : 'No employees selected';
            if (selectedContracts.size === 0) {
                selectedList.innerHTML = '<p class="text-gray-500">' + noSel + '</p>';
                return;
            }
            
            const selected = contracts.filter(c => selectedContracts.has(c.id));
            selectedList.innerHTML = selected.map(c => {
                const name = c.foreign_name && c.foreign_last_name 
                    ? `${c.foreign_name} ${c.foreign_last_name}`
                    : `${c.first_name} ${c.last_name}`;
                return `<div class="text-sm">${name} - ${c.contract_number || 'N/A'}</div>`;
            }).join('');
        }

        function applyFilters() {
            loadContracts();
        }

        function clearFilters() {
            document.getElementById('filterName').value = '';
            if (document.getElementById('filterBranch')) document.getElementById('filterBranch').value = '';
            document.getElementById('filterYear').value = '';
            document.getElementById('filterStatus').value = '';
            loadContracts();
        }

        function openBulkRenewalModal() {
            if (selectedContracts.size === 0) {
                const msg = typeof translate === 'function' ? translate('contract.select_at_least_one') : 'Please select at least one contract to renew';
                alert(msg);
                return;
            }
            document.getElementById('bulkRenewalModal').classList.add('active');
            updateSelectedCount();
        }

        function closeBulkRenewalModal() {
            document.getElementById('bulkRenewalModal').classList.remove('active');
        }

        async function submitBulkRenewal() {
            const startDate = document.getElementById('renewStartDate').value;
            if (!startDate) {
                alert('Start date is required');
                return;
            }

            const employeeIds = Array.from(selectedContracts).map(id => {
                const contract = contracts.find(c => c.id === id);
                return contract.employee_id;
            });

            try {
                const apiServices = (typeof window !== 'undefined' && window.API_SERVICES) ? window.API_SERVICES : {
                    users: 'http://localhost:3002'
                };
                
                const response = await authManager.makeAuthenticatedRequest(
                    `${apiServices.users}/contracts/renew`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            employee_ids: employeeIds,
                            start_date: startDate,
                            end_date: document.getElementById('renewEndDate').value || null,
                            contract_salary: document.getElementById('renewSalary').value || null,
                            probation_months: parseInt(document.getElementById('renewProbation').value) || 0,
                            position_id: document.getElementById('renewPosition').value || null
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(errorData.error || 'Failed to renew contracts');
                }

                const result = await response.json();
                alert(`Successfully renewed ${result.success.length} contract(s)`);
                closeBulkRenewalModal();
                selectedContracts.clear();
                await loadContracts();
            } catch (error) {
                console.error('Error renewing contracts:', error);
                alert('Error renewing contracts: ' + (error.message || 'Unknown error'));
            }
        }

        async function viewContract(contractId) {
            try {
                const contract = await APIService.request('users', `/contracts/${contractId}`);
                currentContractId = contractId;
                document.getElementById('generateDocBtn').style.display = 'block';
                
                const employeeName = contract.foreign_name && contract.foreign_last_name 
                    ? `${contract.foreign_name} ${contract.foreign_last_name}`
                    : `${contract.first_name} ${contract.last_name}`;
                
                document.getElementById('contractDetailsContent').innerHTML = `
                    <div class="space-y-4">
                        <div><strong>Contract Number:</strong> ${contract.contract_number || 'N/A'}</div>
                        <div><strong>Employee:</strong> ${employeeName}</div>
                        <div><strong>Position:</strong> ${contract.position_name || 'N/A'}</div>
                        <div><strong>Start Date:</strong> ${formatDate(contract.start_date)}</div>
                        <div><strong>End Date:</strong> ${contract.end_date ? formatDate(contract.end_date) : 'Open-ended'}</div>
                        <div><strong>Duration:</strong> ${contract.duration_months || 'N/A'} months</div>
                        <div><strong>Salary:</strong> ${contract.contract_salary ? formatCurrency(contract.contract_salary) : 'N/A'}</div>
                        <div><strong>Probation Period:</strong> ${contract.probation_months || 0} months</div>
                        <div><strong>Status:</strong> <span class="status-badge ${contract.is_active ? 'status-active' : 'status-expired'}">${contract.is_active ? 'Active' : 'Inactive'}</span></div>
                    </div>
                `;
                document.getElementById('contractDetailsModal').classList.add('active');
            } catch (error) {
                console.error('Error loading contract:', error);
                alert('Error loading contract details');
            }
        }

        function closeContractDetailsModal() {
            document.getElementById('contractDetailsModal').classList.remove('active');
            currentContractId = null;
        }

        async function editContract(contractId) {
            try {
                const contract = await APIService.request('users', `/contracts/${contractId}`);
                document.getElementById('editContractId').value = contractId;
                document.getElementById('editStartDate').value = contract.start_date ? contract.start_date.split('T')[0] : '';
                document.getElementById('editEndDate').value = contract.end_date ? contract.end_date.split('T')[0] : '';
                document.getElementById('editSalary').value = contract.contract_salary || '';
                document.getElementById('editProbation').value = contract.probation_months || 0;
                document.getElementById('editContractModal').classList.add('active');
            } catch (error) {
                console.error('Error loading contract:', error);
                alert('Error loading contract for editing: ' + (error.message || 'Unknown error'));
            }
        }

        function closeEditContractModal() {
            document.getElementById('editContractModal').classList.remove('active');
        }

        document.getElementById('editContractForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const contractId = document.getElementById('editContractId').value;
            
            try {
                const apiServices = (typeof window !== 'undefined' && window.API_SERVICES) ? window.API_SERVICES : {
                    users: 'http://localhost:3002'
                };
                
                const response = await authManager.makeAuthenticatedRequest(
                    `${apiServices.users}/contracts/${contractId}`,
                    {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            start_date: document.getElementById('editStartDate').value,
                            end_date: document.getElementById('editEndDate').value || null,
                            contract_salary: document.getElementById('editSalary').value || null,
                            probation_months: parseInt(document.getElementById('editProbation').value) || 0
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(errorData.error || 'Failed to update contract');
                }

                alert('Contract updated successfully');
                closeEditContractModal();
                await loadContracts();
            } catch (error) {
                console.error('Error updating contract:', error);
                alert('Error updating contract: ' + (error.message || 'Unknown error'));
            }
        });

        async function viewContractHistory(employeeId) {
            try {
                const history = await APIService.request('users', `/employees/${employeeId}/contracts`);
                const employee = contracts.find(c => c.employee_id === employeeId);
                const employeeName = employee ? (employee.foreign_name && employee.foreign_last_name 
                    ? `${employee.foreign_name} ${employee.foreign_last_name}`
                    : `${employee.first_name} ${employee.last_name}`) : 'Employee';
                
                const historyHtml = `
                    <h3 class="text-xl font-bold mb-4">Contract History for ${employeeName}</h3>
                    <div class="space-y-2">
                        ${history.map(c => `
                            <div class="border p-3 rounded">
                                <div><strong>Contract #:</strong> ${c.contract_number || 'N/A'}</div>
                                <div><strong>Period:</strong> ${formatDate(c.start_date)} - ${c.end_date ? formatDate(c.end_date) : 'Open-ended'}</div>
                                <div><strong>Salary:</strong> ${c.contract_salary ? formatCurrency(c.contract_salary) : 'N/A'}</div>
                                <div><strong>Status:</strong> <span class="status-badge ${c.is_active ? 'status-active' : 'status-expired'}">${c.is_active ? 'Active' : 'Inactive'}</span></div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                document.getElementById('contractDetailsContent').innerHTML = historyHtml;
                document.getElementById('contractDetailsModal').classList.add('active');
                document.getElementById('generateDocBtn').style.display = 'none';
            } catch (error) {
                console.error('Error loading contract history:', error);
                alert('Error loading contract history');
            }
        }

        async function deleteContract(contractId) {
            if (!confirm('Are you sure you want to delete this contract?')) {
                return;
            }

            try {
                const apiServices = (typeof window !== 'undefined' && window.API_SERVICES) ? window.API_SERVICES : {
                    users: 'http://localhost:3002'
                };
                
                const response = await authManager.makeAuthenticatedRequest(
                    `${apiServices.users}/contracts/${contractId}`,
                    { method: 'DELETE' }
                );

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(errorData.error || 'Failed to delete contract');
                }

                alert('Contract deleted successfully');
                await loadContracts();
            } catch (error) {
                console.error('Error deleting contract:', error);
                alert('Error deleting contract: ' + (error.message || 'Unknown error'));
            }
        }

        async function downloadContractTemplate() {
            try {
                const apiServices = (typeof window !== 'undefined' && window.API_SERVICES) ? window.API_SERVICES : { users: 'http://localhost:3002' };
                const response = await authManager.makeAuthenticatedRequest(
                    `${apiServices.users}/contracts/download-template`,
                    { method: 'GET' }
                );
                if (!response.ok) {
                    const err = await response.json().catch(() => ({ error: 'Failed to download template' }));
                    throw new Error(err.error || 'Failed to download template');
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'contract-template-with-placeholders.docx';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Error downloading template:', error);
                alert('Error: ' + (error.message || 'Could not download template'));
            }
        }

        async function generateContractDocument() {
            if (!currentContractId) return;
            
            try {
                const apiServices = (typeof window !== 'undefined' && window.API_SERVICES) ? window.API_SERVICES : {
                    users: 'http://localhost:3002'
                };
                
                const response = await authManager.makeAuthenticatedRequest(
                    `${apiServices.users}/contracts/${currentContractId}/generate-document`,
                    { method: 'GET' }
                );

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(errorData.error || 'Failed to generate document');
                }

                // Download the document
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `contract_${currentContractId}_${new Date().toISOString().split('T')[0]}.docx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                alert('Contract document generated and downloaded successfully');
            } catch (error) {
                console.error('Error generating document:', error);
                alert('Error generating document: ' + (error.message || 'Unknown error'));
            }
        }
    </script>
</body>
</html>
