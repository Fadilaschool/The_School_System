<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title data-translate="page.parametres.title">Settings - Signals Management</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
	<link href="../assets/css/style.css" rel="stylesheet">
	<style>
		.embed-container {
			height: calc(100vh - 80px);
			margin-top: 80px;
		}

		.embed-frame {
			width: 100%;
			height: 100%;
			border: 0;
			background: #fff;
		}
	</style>
</head>

<body class="bg-gray-50">

	<main class="min-h-screen">
		<div class="embed-container">
			<iframe id="parametresFrame" src="../../hr_tasks/hr_tasks/public/parametres.html?v=1" class="embed-frame"
				title="Settings"></iframe>
		</div>
	</main>

	<script src="../assets/js/auth.js"></script>
	<script src="../assets/js/translations.js"></script>
	<script src="../assets/js/main.js"></script>
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			if (!requireAuth()) return;
			
			const userRole = authManager.getUserRole();
			const normalizedRole = userRole ? userRole.toLowerCase() : '';
			
			// Allow department responsible users (and directors for oversight)
			const isResponsible = userRole === 'Department_Responsible' ||
				normalizedRole === 'department_responsible' ||
				normalizedRole === 'department responsible';
			const isDirector = normalizedRole === 'director';

			if (!isResponsible && !isDirector) {
				console.log('Access denied. User role:', userRole, 'Expected: Department_Responsible or Director');
				authManager.redirectToDashboard();
				return;
			}
			
			console.log('Access granted for role:', userRole);
			initializeCollapsibleSidebar();
			
			// Load the Parameters/Settings UI from hr_tasks in embed mode
			const frame = document.getElementById('parametresFrame');
			const token = localStorage.getItem('token') || sessionStorage.getItem('token') || '';
			const user = (window.authManager && window.authManager.getUser && window.authManager.getUser()) || {};
			const responsibleId = user.employee_id || user.id || '';
			const tokenParam = token ? `&token=${encodeURIComponent(token)}` : '';
			const respParam = responsibleId ? `&responsibleId=${encodeURIComponent(responsibleId)}` : '';
			frame.src = `../../hr_tasks/hr_tasks/public/parametres.html?embed=1${tokenParam}${respParam}&v=1`;

			// Initialize translations
			if (typeof updatePageTranslations === 'function') {
				updatePageTranslations();
			}
		});
	</script>
</body>

</html>
